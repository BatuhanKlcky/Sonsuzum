<!DOCTYPE html>
<html lang="tr">
<head>

    <script src="https://unpkg.com/@supabase/supabase-js@2.42.5/dist/umd/supabase.js"></script>

<script>
  const supabaseUrl = 'https://lvoeziofefbczugymzft.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2b2V6aW9mZWZiY3p1Z3ltemZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU1ODY1MjcsImV4cCI6MjA2MTE2MjUyN30.u9HyvUCxkchSmtwDzwAm2iy6yQiA7rScCQjKXCpq7XI';
  const client = supabase.createClient(supabaseUrl, supabaseKey);

  let visitStart = Date.now();

  // IP adresini al
  fetch('https://api.ipify.org?format=json')
    .then(response => response.json())
    .then(ipData => {
      const page_url = window.location.href;
      const user_agent = navigator.userAgent;
      const screen_resolution = `${window.screen.width}x${window.screen.height}`;
      const ip_address = ipData.ip;

      // Sayfa kapanınca ziyaret kaydet
      window.addEventListener('beforeunload', async () => {
        const visitEnd = Date.now();
        const time_spent = Math.floor((visitEnd - visitStart) / 1000);

        const { error } = await client
          .from('visitor_logs')
          .insert([{
            page_url,
            ip_address,
            user_agent,
            screen_resolution,
            time_spent
          }]);

        if (error) {
          console.error('Ziyaretçi kaydedilirken hata:', error);
        } else {
          console.log('Ziyaret kaydedildi!');
        }
      });
    });
</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINATED</title>
    <style>
        body {
            background-color: #050505;
            color: #00FF41; /* Klasik terminal yeşili */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Tarama çizgisi efekti */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal-window {
            width: 90%;
            max-width: 700px;
            padding: 40px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            background: rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 1;
        }

        .error-header {
            color: #FF3131; /* Hata kırmızısı */
            font-weight: bold;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 1px solid #FF3131;
            padding-bottom: 10px;
        }

        .content {
            line-height: 1.6;
            font-size: 1.1rem;
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: #00FF41;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .system-status {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

<div class="terminal-window">

    <div class="system-status">
        [PROCESS_COMPLETE]<br>
        [MEMORY_WIPED: 100%]<br>

    </div>
</div>

</body>
</html>
