<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Erkut Dincel | Pro Garden v12.1 Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #020205; cursor: crosshair; }
        .ui-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; width: 340px; z-index: 1000; }
        .ui-panel { background: rgba(10, 15, 25, 0.98); backdrop-filter: blur(20px); padding: 20px; border-radius: 25px; color: white; text-align: center; border: 1px solid rgba(0, 212, 255, 0.15); box-shadow: 0 15px 60px rgba(0,0,0,1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        button { border: none; padding: 14px; border-radius: 15px; color: white; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        #clock { font-size: 24px; color: #00d4ff; margin-bottom: 5px; font-weight: 200; }
        .stats { font-size: 10px; color: #666; }
        #butterfly-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; overflow: hidden; }
        .b-wrap { position: absolute; transform-style: preserve-3d; will-change: transform; }
        .butterfly { position: relative; width: 30px; height: 30px; transform-style: preserve-3d; transform: rotateX(45deg); }
        .wing { position: absolute; width: 15px; height: 30px; fill: #ffdf00; filter: drop-shadow(0 0 5px gold); }
        .wing.l { transform-origin: right center; animation: flap-l 0.35s ease-in-out infinite; }
        .wing.r { left: 15px; transform-origin: left center; animation: flap-r 0.35s ease-in-out infinite; }
        @keyframes flap-l { 0%,100% {transform: rotateY(0deg);} 50% {transform: rotateY(75deg);} }
        @keyframes flap-r { 0%,100% {transform: rotateY(0deg);} 50% {transform: rotateY(-75deg);} }
    </style>
</head>
<body>

    <svg style="display:none"><symbol id="w-shape" viewBox="0 0 25 50"><path d="M25,50 C25,50 0,40 0,25 C0,10 15,0 25,10 L25,50 Z" /></symbol></svg>
    <div id="butterfly-layer"></div>

    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock">00:00</div>
            <div class="stats">NEM: <b>%<span id="hp">0</span></b> | BİTKİ: <b><span id="fCount">0</span></b> | ZARARLI: <b><span id="pCount">0</span></b></div>
            <div class="controls">
                <button class="btn-water" onclick="giveWater()">💧 NEMLENDİR</button>
                <button class="btn-seed" onclick="plantSeed()">🌱 TOHUM AT</button>
            </div>
        </div>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(22, 18, 22);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.CircleGeometry(16, 64), new THREE.MeshStandardMaterial({ color: 0x080808 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const waterDropPerFrame = 0.05 / (3600 * 60);
        const growthPerFrame = 1.0 / (2 * 24 * 3600 * 60);
        const flowers = [];
        const pests = [];

        function createFlower(x, z, savedData = null) {
            const group = new THREE.Group();
            const color = savedData ? savedData.color : [0xff4d6d, 0xffd166, 0x06d6a0, 0x118ab2][Math.floor(Math.random()*4)];
            const stemMat = new THREE.MeshStandardMaterial({color: 0x2d6a4f});
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.08, 1, 8), stemMat);
            stem.position.y = 0.5;
            group.add(stem);
            const petalsGroup = new THREE.Group();
            const petalMat = new THREE.MeshStandardMaterial({color: color});
            const pGeo = new THREE.SphereGeometry(0.25, 8, 4);
            pGeo.scale(1, 0.15, 1.4); pGeo.translate(0, 0, 0.6);
            for(let i=0; i<6; i++) {
                const p = new THREE.Mesh(pGeo, petalMat);
                p.position.y = 1; p.rotation.y = (i * Math.PI * 2) / 6; p.rotation.x = Math.PI / 2;
                petalsGroup.add(p);
            }
            petalsGroup.scale.set(0.001, 0.001, 0.001);
            group.add(petalsGroup);
            group.position.set(x, 0, z);
            const flowerObj = { mesh: group, petals: petalsGroup, stemMat, petalMat, originalColor: color, currentHeight: savedData?.height || 0.1, bloomProgress: savedData?.bloom || 0, water: savedData?.water || 1.1, isWithered: false };
            scene.add(group); flowers.push(flowerObj);
            document.getElementById('fCount').innerText = flowers.length;
            return flowerObj;
        }

        function createDetailedPest(x, z) {
            const group = new THREE.Group();
            const pestMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 4), pestMat);
            body.scale.set(1.2, 0.8, 1.4); body.position.y = 0.15; group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 4), pestMat);
            head.position.set(0, 0.2, 0.5); group.add(head);
            const legGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 4);
            [ [0.2,0.1,0.2], [-0.2,0.1,0.2], [0.2,0.1,-0.2], [-0.2,0.1,-0.2] ].forEach(p => {
                const leg = new THREE.Mesh(legGeo, pestMat); leg.position.set(p[0],p[1],p[2]); group.add(leg);
            });
            group.position.set(x, 0, z); scene.add(group);
            return group;
        }

        function plantSeed() { if(flowers.length < 35) createFlower((Math.random()-0.5)*26, (Math.random()-0.5)*26); }
        function giveWater() { flowers.forEach(f => f.water = Math.min(1.5, f.water + 0.3)); }

        // --- TIKLAMA DÜZELTME ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const hitList = pests.map(p => p.mesh);
            const intersects = raycaster.intersectObjects(hitList, true);

            if(intersects.length > 0) {
                let targetGroup = intersects[0].object;
                while(targetGroup.parent && targetGroup.parent !== scene) targetGroup = targetGroup.parent;
                const idx = pests.findIndex(p => p.mesh === targetGroup);
                if(idx > -1) { scene.remove(targetGroup); pests.splice(idx, 1); }
            }
        });

        // --- KELEBEK DÜZELTME ---
        const bData = [];
        for(let i=0; i<6; i++) {
            const el = document.createElement('div'); el.className = 'b-wrap';
            el.innerHTML = `<div class="butterfly"><svg class="wing l"><use xlink:href="#w-shape"></use></svg><svg class="wing r"><use xlink:href="#w-shape"></use></svg></div>`;
            document.getElementById('butterfly-layer').appendChild(el);
            bData.push({ el, pos: new THREE.Vector3((Math.random()-0.5)*25, 5, (Math.random()-0.5)*25), s: Math.random()*100 });
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('pCount').innerText = pests.length;

            if(Math.random() < 0.002 && flowers.length > 0 && pests.length < 6) {
                pests.push({ mesh: createDetailedPest((Math.random()-0.5)*30, (Math.random()-0.5)*30), target: flowers[Math.floor(Math.random()*flowers.length)] });
            }

            pests.forEach(p => {
                if(p.target) {
                    const dir = p.target.mesh.position.clone().sub(p.mesh.position);
                    if(dir.length() > 0.4) { p.mesh.lookAt(p.target.mesh.position); p.mesh.rotation.y += Math.PI; p.mesh.position.add(dir.normalize().multiplyScalar(0.02)); }
                    else { p.target.water -= waterDropPerFrame * 20; }
                }
            });

            flowers.forEach(f => {
                f.water = Math.max(0, f.water - waterDropPerFrame);
                if(f.water < 0.1 && !f.isWithered) { f.isWithered = true; f.stemMat.color.set(0x4a4335); f.petalMat.color.set(0x3d3d3d); f.mesh.rotation.z = 0.5; }
                else if(f.water > 0.5 && f.isWithered) { f.isWithered = false; f.stemMat.color.set(0x2d6a4f); f.petalMat.color.set(f.originalColor); f.mesh.rotation.z = 0; }
                if(f.water > 1.0 && f.currentHeight < 1.3 && !f.isWithered) f.currentHeight += growthPerFrame;
                if(f.currentHeight > 0.7 && !f.isWithered) {
                    f.bloomProgress = Math.min(1.0, f.bloomProgress + 0.005);
                    f.petals.scale.set(f.bloomProgress, f.bloomProgress, f.bloomProgress);
                }
                const s = f.currentHeight * Math.min(1, f.water + 0.2); f.mesh.scale.set(s, s, s);
            });

            bData.forEach((b, i) => {
                b.pos.x += Math.sin(time + b.s) * 0.08; b.pos.z += Math.cos(time + b.s) * 0.08;
                b.pos.y = 4 + Math.sin(time * 1.5 + i) * 2;
                const p = b.pos.clone().project(camera);
                const x = (p.x + 1) * window.innerWidth / 2; const y = (-p.y + 1) * window.innerHeight / 2;
                b.el.style.transform = `translate(-50%,-50%) translate(${x}px,${y}px) scale(${0.8/p.z})`;
                b.el.style.opacity = p.z > 0 && p.z < 1 ? 1 : 0;
            });

            document.getElementById('hp').innerText = flowers.length ? Math.round((flowers.reduce((a,b)=>a+b.water,0)/flowers.length)*100) : 0;
            controls.update(); renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
