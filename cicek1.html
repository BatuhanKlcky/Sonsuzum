<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanal Bahce/title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #020205; cursor: crosshair; touch-action: none; }
        .ui-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; width: 340px; z-index: 1000; }
        .ui-panel { background: rgba(10, 15, 25, 0.98); backdrop-filter: blur(20px); padding: 20px; border-radius: 25px; color: white; text-align: center; border: 1px solid rgba(0, 212, 255, 0.15); box-shadow: 0 15px 60px rgba(0,0,0,1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        button { border: none; padding: 14px; border-radius: 15px; color: white; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        #clock { font-size: 24px; color: #00d4ff; margin-bottom: 5px; font-weight: 200; }
        .stats { font-size: 10px; color: #666; }
        #butterfly-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; overflow: hidden; }
        .b-wrap { position: absolute; transform-style: preserve-3d; }
        .butterfly { position: relative; width: 30px; height: 30px; transform-style: preserve-3d; transform: rotateX(45deg); }
        .wing { position: absolute; width: 15px; height: 30px; fill: #ffdf00; filter: drop-shadow(0 0 5px gold); }
        .wing.l { transform-origin: right center; animation: flap-l 0.35s ease-in-out infinite; }
        .wing.r { left: 15px; transform-origin: left center; animation: flap-r 0.35s ease-in-out infinite; }
        @keyframes flap-l { 0%,100% {transform: rotateY(0deg);} 50% {transform: rotateY(75deg);} }
        @keyframes flap-r { 0%,100% {transform: rotateY(0deg);} 50% {transform: rotateY(-75deg);} }
    </style>
</head>
<body>

    <svg style="display:none"><symbol id="w-shape" viewBox="0 0 25 50"><path d="M25,50 C25,50 0,40 0,25 C0,10 15,0 25,10 L25,50 Z" /></symbol></svg>
    <div id="butterfly-layer"></div>

    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock">00:00</div>
            <div class="stats">NEM: <b>%<span id="hp">0</span></b> | BİTKİ: <b><span id="fCount">0</span></b> | ZARARLI: <b><span id="pCount">0</span></b></div>
            <div class="controls">
                <button class="btn-water" onclick="giveWater()">💧 NEMLENDİR</button>
                <button class="btn-seed" onclick="plantSeed()">🌱 TOHUM AT</button>
            </div>
            <button onclick="resetEverything()" style="background:none; color:#333; font-size:8px; margin-top:10px; border:none;">BAHÇEYİ SIFIRLA</button>
        </div>
    </div>

    <script>
        // --- AYARLAR ---
        const SAVE_KEY = "sanalbahcesv1";
        const growthRate = 1.0 / (2 * 24 * 3600 * 60); // 2 Gün
        const waterLossRate = 0.000015;

        // --- SAHNE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 20);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 40, 10);
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.CircleGeometry(16, 64), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const flowers = [];
        const pests = [];

        // --- KAYIT SİSTEMİ (OTOMATİK) ---
        function autoSave() {
            try {
                const data = {
                    time: Date.now(),
                    plants: flowers.map(f => ({
                        x: f.mesh.position.x, z: f.mesh.position.z,
                        h: f.currentHeight, b: f.bloomProgress, w: f.water, c: f.originalColor
                    }))
                };
                localStorage.setItem(SAVE_KEY, JSON.stringify(data));
                console.log("Otomatik Kayıt Başarılı");
            } catch(e) { console.error("Kayıt yapılamadı!"); }
        }

        function loadGarden() {
            const raw = localStorage.getItem(SAVE_KEY);
            if(!raw) return;
            const data = JSON.parse(raw);
            const diff = (Date.now() - data.time) / 1000;
            data.plants.forEach(p => {
                createFlower(p.x, p.z, {
                    color: p.c, height: p.h, bloom: p.b, 
                    water: Math.max(0, p.w - (diff * 0.00001))
                });
            });
        }

        function resetEverything() { if(confirm("Tüm bahçe silinsin mi?")) { localStorage.removeItem(SAVE_KEY); location.reload(); } }

        // --- OYUN MANTIĞI ---
        function createFlower(x, z, sData = null) {
            const group = new THREE.Group();
            const color = sData ? sData.color : [0xff4d6d, 0xffd166, 0x06d6a0, 0x118ab2][Math.floor(Math.random()*4)];
            const stemMat = new THREE.MeshStandardMaterial({color: 0x2d6a4f});
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.08, 1, 8), stemMat);
            stem.position.y = 0.5; group.add(stem);

            const petals = new THREE.Group();
            const petalMat = new THREE.MeshStandardMaterial({color: color});
            const pGeo = new THREE.SphereGeometry(0.25, 8, 4);
            pGeo.scale(1, 0.15, 1.4); pGeo.translate(0, 0, 0.6);
            for(let i=0; i<6; i++) {
                const p = new THREE.Mesh(pGeo, petalMat);
                p.position.y = 1; p.rotation.y = (i * Math.PI * 2) / 6; p.rotation.x = Math.PI / 2;
                petals.add(p);
            }
            petals.scale.set(0.001, 0.001, 0.001); group.add(petals);
            group.position.set(x, 0, z);

            const fObj = { 
                mesh: group, petals, stemMat, petalMat, originalColor: color,
                currentHeight: sData ? sData.height : 0.1,
                bloomProgress: sData ? sData.bloom : 0,
                water: sData ? sData.water : 1.2,
                isWithered: false
            };
            scene.add(group); flowers.push(fObj);
            document.getElementById('fCount').innerText = flowers.length;
            autoSave(); 
        }

        function createPest(x, z) {
            const group = new THREE.Group();
            const m = new THREE.MeshBasicMaterial({color: 0xff0000});
            const hitbox = new THREE.Mesh(new THREE.BoxGeometry(1.5,1.5,1.5), new THREE.MeshBasicMaterial({visible:false}));
            group.add(hitbox);
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.25,6,4), m);
            body.scale.set(1.2,0.8,1.4); body.position.y=0.15; group.add(body);
            group.position.set(x, 0, z); scene.add(group);
            return group;
        }

        function plantSeed() { if(flowers.length < 40) createFlower((Math.random()-0.5)*26, (Math.random()-0.5)*26); }
        function giveWater() { flowers.forEach(f => f.water = Math.min(1.5, f.water + 0.4)); autoSave(); }

        // --- ETKİLEŞİM ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('pointerdown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(pests.map(p=>p.mesh), true);
            if(hits.length > 0) {
                let t = hits[0].object; while(t.parent && t.parent !== scene) t = t.parent;
                const idx = pests.findIndex(p=>p.mesh === t);
                if(idx > -1) { scene.remove(t); pests.splice(idx, 1); autoSave(); }
            }
        });

        // --- KELEBEKLER ---
        const bData = [];
        for(let i=0; i<6; i++) {
            const el = document.createElement('div'); el.className = 'b-wrap';
            el.innerHTML = `<div class="butterfly"><svg class="wing l"><use xlink:href="#w-shape"></use></svg><svg class="wing r"><use xlink:href="#w-shape"></use></svg></div>`;
            document.getElementById('butterfly-layer').appendChild(el);
            bData.push({ el, pos: new THREE.Vector3((Math.random()-0.5)*20, 5, (Math.random()-0.5)*20), s: Math.random()*100 });
        }

        // --- LOOP ---
        let lastSave = 0;
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('pCount').innerText = pests.length;

            if(Math.random() < 0.0006 && flowers.length > 0 && pests.length < 5) {
                pests.push({ mesh: createPest((Math.random()-0.5)*30, (Math.random()-0.5)*30), target: flowers[Math.floor(Math.random()*flowers.length)] });
            }

            pests.forEach(p => {
                if(p.target) {
                    const d = p.target.mesh.position.clone().sub(p.mesh.position);
                    if(d.length() > 0.4) { p.mesh.lookAt(p.target.mesh.position); p.mesh.rotation.y += Math.PI; p.mesh.position.add(d.normalize().multiplyScalar(0.025)); }
                    else { p.target.water -= 0.0006; }
                }
            });

            flowers.forEach(f => {
                f.water = Math.max(0, f.water - waterLossRate);
                if(f.water < 0.1 && !f.isWithered) { f.isWithered = true; f.stemMat.color.set(0x333333); f.petalMat.color.set(0x222222); f.mesh.rotation.z = 0.4; }
                else if(f.water > 0.5 && f.isWithered) { f.isWithered = false; f.stemMat.color.set(0x2d6a4f); f.petalMat.color.set(f.originalColor); f.mesh.rotation.z = 0; }
                
                if(f.water > 1.0 && f.currentHeight < 1.3 && !f.isWithered) f.currentHeight += growthRate;
                if(f.currentHeight > 0.8 && !f.isWithered) {
                    f.bloomProgress = Math.min(1.0, f.bloomProgress + 0.005);
                    f.petals.scale.set(f.bloomProgress, f.bloomProgress, f.bloomProgress);
                }
                const sc = f.currentHeight * Math.min(1, f.water + 0.2); f.mesh.scale.set(sc, sc, sc);
            });

            bData.forEach((b, i) => {
                b.pos.x += Math.sin(time + b.s) * 0.1; b.pos.z += Math.cos(time + b.s) * 0.1;
                b.pos.y = 4 + Math.sin(time * 1.5 + i) * 2;
                const p = b.pos.clone().project(camera);
                const x = (p.x + 1) * window.innerWidth / 2; const y = (-p.y + 1) * window.innerHeight / 2;
                b.el.style.transform = `translate(-50%,-50%) translate(${x}px,${y}px) scale(${0.8/p.z})`;
                b.el.style.opacity = (p.z > 0 && p.z < 1) ? 1 : 0;
            });

            if(time - lastSave > 5) { autoSave(); lastSave = time; }
            document.getElementById('hp').innerText = flowers.length ? Math.round((flowers.reduce((a,b)=>a+b.water,0)/flowers.length)*100) : 0;
            controls.update(); renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        window.addEventListener('load', loadGarden);
        animate();
    </script>
</body>
</html>
