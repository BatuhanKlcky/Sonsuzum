<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garden Final v15.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #020205; cursor: crosshair; touch-action: none; }
        #butterfly-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; overflow: hidden; }
        .b-wrap { position: absolute; transform-style: preserve-3d; }
        .butterfly { position: relative; width: 30px; height: 30px; transform-style: preserve-3d; transform: rotateX(45deg); }
        .wing { position: absolute; width: 15px; height: 30px; fill: #ffdf00; filter: drop-shadow(0 0 5px gold); }
        .wing.l { transform-origin: right center; animation: flap-l 0.35s ease-in-out infinite; }
        .wing.r { left: 15px; transform-origin: left center; animation: flap-r 0.35s ease-in-out infinite; }
        @keyframes flap-l { 0%,100% {transform: rotateY(0deg);} 50% {transform: rotateY(75deg);} }
        @keyframes flap-r { 0%,100% {transform: rotateY(0deg);} 50% {transform: rotateY(-75deg);} }
        .ui-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 340px; z-index: 1000; }
        .ui-panel { background: rgba(10, 15, 25, 0.98); backdrop-filter: blur(20px); padding: 20px; border-radius: 25px; color: white; text-align: center; border: 1px solid rgba(0, 212, 255, 0.15); box-shadow: 0 15px 60px rgba(0,0,0,1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        button { border: none; padding: 14px; border-radius: 15px; color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        #clock { font-size: 24px; color: #00d4ff; margin-bottom: 5px; font-weight: 200; }
        #save-indicator { position: fixed; top: 10px; right: 10px; font-size: 10px; color: #2ecc71; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="save-indicator">SİSTEM BAŞLATILIYOR...</div>
    <svg style="display:none"><symbol id="w-shape" viewBox="0 0 25 50"><path d="M25,50 C25,50 0,40 0,25 C0,10 15,0 25,10 L25,50 Z" /></symbol></svg>
    <div id="butterfly-layer"></div>

    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock">00:00</div>
            <div style="font-size: 10px; color: #666;">NEM: %<span id="hp">0</span> | BİTKİ: <span id="fCount">0</span></div>
            <div class="controls">
                <button class="btn-water" onclick="giveWater()">💧 SULA</button>
                <button class="btn-seed" onclick="plantSeed()">🌱 TOHUM</button>
            </div>
            <button onclick="resetData()" style="background:none; border:none; color:#444; font-size:8px; margin-top:10px; cursor:pointer;">VERİLERİ TEMİZLE</button>
        </div>
    </div>

    <script>
        // --- HAFIZA ANAHTARI ---
        const SAVE_ID = "erkut_garden_v15_final_fix";
        const flowers = [];
        const pests = [];

        // --- ZIRHLI KAYIT METODU ---
        window.saveData = function() {
            try {
                const state = {
                    time: Date.now(),
                    data: flowers.map(f => ({
                        x: f.mesh.position.x, z: f.mesh.position.z,
                        h: f.h, b: f.b, w: f.w, c: f.c
                    }))
                };
                window.localStorage.setItem(SAVE_ID, JSON.stringify(state));
                document.getElementById('save-indicator').innerText = "KAYIT DURUMU: GÜVENLİ";
                document.getElementById('save-indicator').style.color = "#2ecc71";
            } catch (err) {
                document.getElementById('save-indicator').innerText = "KAYIT HATASI: TARAYICI ENGELLİ";
                document.getElementById('save-indicator').style.color = "#ff4757";
            }
        };

        window.loadData = function() {
            const raw = window.localStorage.getItem(SAVE_ID);
            if (!raw) {
                document.getElementById('save-indicator').innerText = "YENİ BAHÇE OLUŞTURULDU";
                return;
            }
            const parsed = JSON.parse(raw);
            const passed = (Date.now() - parsed.time) / 1000;
            parsed.data.forEach(p => {
                createFlower(p.x, p.z, { ...p, w: Math.max(0, p.w - (passed * 0.00001)) });
            });
            document.getElementById('save-indicator').innerText = "HAFIZA YÜKLENDİ";
        };

        window.resetData = function() {
            if(confirm("Tüm veriler silinecek, emin misin?")) {
                window.localStorage.removeItem(SAVE_ID);
                location.reload();
            }
        };

        // --- THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(22, 18, 22);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.CircleGeometry(16, 64), new THREE.MeshStandardMaterial({ color: 0x080808 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- MODELLER ---
        function createFlower(x, z, s = null) {
            const group = new THREE.Group();
            const color = s ? s.c : [0xff4d6d, 0xffd166, 0x06d6a0, 0x118ab2][Math.floor(Math.random()*4)];
            const stemMat = new THREE.MeshStandardMaterial({color: 0x2d6a4f});
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.08, 1), stemMat);
            stem.position.y = 0.5; group.add(stem);
            const petals = new THREE.Group();
            const pMat = new THREE.MeshStandardMaterial({color: color});
            const pGeo = new THREE.SphereGeometry(0.2, 8, 4);
            pGeo.scale(1, 0.15, 1.4); pGeo.translate(0, 0, 0.5);
            for(let i=0; i<6; i++) {
                const p = new THREE.Mesh(pGeo, pMat);
                p.position.y = 1; p.rotation.y = (i * Math.PI)/3; p.rotation.x = Math.PI/2;
                petals.add(p);
            }
            petals.scale.set(0.001, 0.001, 0.001); group.add(petals);
            group.position.set(x, 0, z);
            scene.add(group);
            const fObj = { mesh: group, petals, stemMat, pMat, h: s?s.h:0.1, b: s?s.b:0, w: s?s.w:1.2, c: color };
            flowers.push(fObj);
            document.getElementById('fCount').innerText = flowers.length;
            window.saveData();
        }

        function createPest(x, z) {
            const group = new THREE.Group();
            const m = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), m);
            body.scale.set(1.2, 0.8, 1.4); body.position.y = 0.15; group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.15), m);
            head.position.set(0, 0.2, 0.45); group.add(head);
            const lGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4);
            for(let i=0; i<4; i++) {
                const leg = new THREE.Mesh(lGeo, m);
                leg.position.set(i<2?0.2:-0.2, 0.1, i%2?0.2:-0.2);
                leg.rotation.z = i<2?0.6:-0.6; group.add(leg);
            }
            group.position.set(x, 0, z); scene.add(group);
            return group;
        }

        window.plantSeed = () => { if(flowers.length < 45) createFlower((Math.random()-0.5)*26, (Math.random()-0.5)*26); };
        window.giveWater = () => { flowers.forEach(f => f.w = Math.min(1.5, f.w + 0.4)); window.saveData(); };

        // --- KELEBEKLER ---
        const bData = [];
        for(let i=0; i<6; i++) {
            const el = document.createElement('div'); el.className = 'b-wrap';
            el.innerHTML = `<div class="butterfly"><svg class="wing l"><use xlink:href="#w-shape"></use></svg><svg class="wing r"><use xlink:href="#w-shape"></use></svg></div>`;
            document.getElementById('butterfly-layer').appendChild(el);
            bData.push({ el, pos: new THREE.Vector3((Math.random()-0.5)*25, 5, (Math.random()-0.5)*25), s: Math.random()*100 });
        }

        // --- DÖNGÜ ---
        let lastAuto = 0;
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});

            flowers.forEach(f => {
                f.w = Math.max(0, f.w - 0.000015);
                if(f.w < 0.1) { f.stemMat.color.set(0x333333); f.pMat.color.set(0x222222); f.mesh.rotation.z = 0.4; }
                else { f.stemMat.color.set(0x2d6a4f); f.pMat.color.set(f.c); f.mesh.rotation.z = 0; }
                if(f.w > 1.0 && f.h < 1.3) f.h += (1.0 / (2 * 24 * 3600 * 60));
                if(f.h > 0.8) { f.b = Math.min(1.0, f.b + 0.005); f.petals.scale.set(f.b, f.b, f.b); }
                const sc = f.h * Math.min(1, f.w + 0.2); f.mesh.scale.set(sc, sc, sc);
            });

            if(Math.random() < 0.0006 && flowers.length > 0 && pests.length < 5) {
                pests.push({ m: createPest((Math.random()-0.5)*30, (Math.random()-0.5)*30), t: flowers[Math.floor(Math.random()*flowers.length)] });
            }
            pests.forEach(p => {
                const dist = p.t.mesh.position.clone().sub(p.m.position);
                if(dist.length() > 0.4) { p.m.lookAt(p.t.mesh.position); p.m.rotation.y += Math.PI; p.m.position.add(dist.normalize().multiplyScalar(0.025)); }
            });

            bData.forEach((b, i) => {
                b.pos.x += Math.sin(time + b.s) * 0.1; b.pos.z += Math.cos(time + b.s) * 0.1;
                b.pos.y = 4 + Math.sin(time * 1.5 + i) * 2;
                const p = b.pos.clone().project(camera);
                const x = (p.x + 1) * window.innerWidth / 2; const y = (-p.y + 1) * window.innerHeight / 2;
                b.el.style.transform = `translate(-50%,-50%) translate(${x}px,${y}px) scale(${0.8/p.z})`;
                b.el.style.opacity = (p.z > 0 && p.z < 1) ? 1 : 0;
            });

            if(time - lastAuto > 10) { window.saveData(); lastAuto = time; }
            document.getElementById('hp').innerText = flowers.length ? Math.round((flowers.reduce((a,b)=>a+b.w,0)/flowers.length)*100) : 0;
            controls.update(); renderer.render(scene, camera);
        }

        window.onload = window.loadData;
        animate();
    </script>
</body>
</html>
