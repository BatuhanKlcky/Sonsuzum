<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Botanik Bahçesi v6.2 - Tam Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #000; }
        
        .ui-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; width: 340px; z-index: 100;
        }

        .ui-panel {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 25px; color: white;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        button {
            border: none; padding: 12px; border-radius: 15px; color: white; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 11px;
        }

        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        
        #clock { font-size: 18px; letter-spacing: 2px; margin-bottom: 5px; color: #00d4ff; }
        .stat-text { font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock">00:00</div>
            <div class="stat-text">Bahçe Sağlığı: <b>%<span id="hp">0</span></b></div>
            <div class="stat-text" style="color:#ff6b6b">Zararlı Böcek: <span id="pests-count">0</span></div>
            <div class="controls">
                <button id="wBtn" class="btn-water" onclick="giveWater()">💧 SULA</button>
                <button class="btn-seed" onclick="plantSeed()">🌱 TOHUM EK</button>
            </div>
        </div>
    </div>

    <script>
        const MAX_HEALTH = 1.5; 
        const HOURLY_DECAY = 0.02; 
        let lastFrameTime = Date.now();
        let gData = { flowers: [], lastWater: Date.now() };

        const saved = localStorage.getItem('garden_v6_fixed');
        if(saved) gData = JSON.parse(saved);

        // --- SAHNE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x1a2a44, 20, 100); // Sis mesafesi artırıldı (Görünürlük için)

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.2;

        // Işıklar
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(20, 40, 20);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Gökyüzü
        const skyGeo = new THREE.SphereGeometry(150, 32, 32);
        const skyMat = new THREE.MeshBasicMaterial({ color: 0x87ceeb, side: THREE.BackSide });
        const sky = new THREE.Mesh(skyGeo, skyMat);
        scene.add(sky);

        // Dağlar
        function createMountains() {
            const mtnGroup = new THREE.Group();
            const mtnGeo = new THREE.ConeGeometry(10, 20, 4);
            const mtnMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, flatShading: true });
            for(let i=0; i<15; i++) {
                const m = new THREE.Mesh(mtnGeo, mtnMat);
                const angle = (i / 15) * Math.PI * 2;
                const dist = 50 + Math.random() * 20;
                m.position.set(Math.cos(angle)*dist, -5, Math.sin(angle)*dist);
                m.scale.y = 0.8 + Math.random();
                mtnGroup.add(m);
            }
            scene.add(mtnGroup);
            return mtnMat;
        }
        const mtnMaterial = createMountains();

        // Zemin
        const ground = new THREE.Mesh(
            new THREE.CylinderGeometry(12, 12, 0.5, 32),
            new THREE.MeshStandardMaterial({ color: 0x1a1a1a })
        );
        ground.position.y = -0.25; // Çiçeklerin altında kalsın
        scene.add(ground);

        // --- ÇİÇEK SİSTEMİ ---
        const flowerMeshes = [];
        const colors = [0xff4d6d, 0xffb703, 0x219ebc, 0x9b59b6, 0x2ecc71];

        function createFlowerMesh(data) {
            const group = new THREE.Group();
            
            // Sap
            const stem = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08, 0.12, 1, 8),
                new THREE.MeshStandardMaterial({ color: 0x2d6a4f })
            );
            stem.position.y = 0.5;
            group.add(stem);

            // Çiçek Kafası
            const head = new THREE.Group();
            const petalMat = new THREE.MeshStandardMaterial({ color: data.color, flatShading: true });
            for(let i=0; i<6; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 6), petalMat);
                p.scale.set(1.5, 0.4, 0.8);
                const angle = (i / 6) * Math.PI * 2;
                p.position.set(Math.cos(angle)*0.35, 1, Math.sin(angle)*0.35);
                p.rotation.y = -angle;
                head.add(p);
            }
            group.add(head);

            group.position.set(data.x, 0, data.z);
            scene.add(group);
            return { mesh: group, stem: stem, head: head, data: data };
        }

        function plantSeed() {
            if(gData.flowers.length >= 25) return;
            const f = { 
                x: (Math.random() - 0.5) * 18, 
                z: (Math.random() - 0.5) * 18, 
                color: colors[Math.floor(Math.random() * colors.length)], 
                age: 0.3, // Başlangıçta biraz daha büyük başlasın ki görülsün
                health: 1.0 
            };
            gData.flowers.push(f);
            flowerMeshes.push(createFlowerMesh(f));
            save();
        }

        function giveWater() {
            gData.flowers.forEach(f => f.health = Math.min(MAX_HEALTH, f.health + 0.3));
            save();
        }

        function save() { localStorage.setItem('garden_v6_fixed', JSON.stringify(gData)); }

        // Yükleme
        gData.flowers.forEach(f => flowerMeshes.push(createFlowerMesh(f)));

        // --- DÖNGÜ ---
        const pests = [];
        function animate() {
            requestAnimationFrame(animate);
            const now = new Date();
            const nowTime = Date.now();
            const deltaTime = (nowTime - lastFrameTime) / 1000;
            lastFrameTime = nowTime;

            document.getElementById('clock').textContent = now.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            const hr = now.getHours();
            const isDay = hr >= 6 && hr < 19;
            sky.material.color.lerp(new THREE.Color(isDay ? 0x87ceeb : 0x050510), 0.02);
            scene.fog.color.lerp(new THREE.Color(isDay ? 0xaaddee : 0x050510), 0.02);
            sun.intensity = isDay ? 1.5 : 0.2;

            let totalH = 0;
            flowerMeshes.forEach((fm, i) => {
                fm.data.health = Math.max(0.3, fm.data.health - (HOURLY_DECAY/3600 * deltaTime));
                if(fm.data.age < 1.0) fm.data.age += 0.0002 * deltaTime; // Biraz daha hızlı büyüme
                
                const s = fm.data.age * fm.data.health;
                fm.mesh.scale.set(s, s, s);
                fm.mesh.rotation.x = Math.sin(nowTime*0.001 + i) * 0.03;
                totalH += (fm.data.health / MAX_HEALTH);
            });

            document.getElementById('hp').textContent = flowerMeshes.length > 0 ? Math.round((totalH/flowerMeshes.length)*100) : 0;
            document.getElementById('pests-count').textContent = pests.length;

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
