<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Garden v8.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #0a0a12; }

        /* UI */
        .ui-container {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 12px; width: 320px; z-index: 1000;
        }
        .ui-panel {
            background: rgba(15, 15, 25, 0.85); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 25px; color: white;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.7);
        }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        button {
            border: none; padding: 14px; border-radius: 15px; color: white; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; font-size: 11px;
        }
        .btn-water { background: #3498db; box-shadow: 0 4px 0 #2980b9; }
        .btn-seed { background: #2ecc71; box-shadow: 0 4px 0 #27ae60; }
        button:active { transform: translateY(3px); box-shadow: none; }
        
        #clock { font-size: 24px; color: #00d4ff; margin-bottom: 5px; font-weight: 300; }
        .stats { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        /* BUTTERFLY CSS */
        #butterfly-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .b-wrapper { position: absolute; transform-style: preserve-3d; }
        .b-body { position: relative; width: 30px; height: 30px; transform-style: preserve-3d; transform: rotateX(50deg); }
        .wing { position: absolute; width: 15px; height: 30px; fill: #f1c40f; }
        .wing.l { transform-origin: right center; animation: flap-l 0.3s ease-in-out infinite; }
        .wing.r { left: 15px; transform-origin: left center; animation: flap-r 0.3s ease-in-out infinite; }
        @keyframes flap-l { 0%,100% {transform: rotateY(0deg);} 50% {transform: rotateY(70deg);} }
        @keyframes flap-r { 0%,100% {transform: rotateY(0deg);} 50% {transform: rotateY(-70deg);} }

        .svg-defs { position: absolute; width: 0; height: 0; }
    </style>
</head>
<body>

    <svg class="svg-defs">
        <symbol id="w-shape" viewBox="0 0 25 50">
            <path d="M25,50 C25,50 0,40 0,25 C0,10 15,0 25,10 L25,50 Z" />
        </symbol>
    </svg>

    <div id="butterfly-container"></div>

    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock">12:00</div>
            <div class="stats">Bahçe Durumu: <span id="hp">100</span>% | Çiçek: <span id="fCount">0</span></div>
            <div class="controls">
                <button class="btn-water" onclick="giveWater()">💧 SULA</button>
                <button class="btn-seed" onclick="plantSeed()">🌱 TOHUM</button>
            </div>
        </div>
    </div>

    <script>
        // --- SAHNE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0a0a12);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Işıklar
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.PointLight(0xffffff, 1.5, 100);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // Zemin
        const geo = new THREE.CircleGeometry(15, 64);
        const mat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 1 });
        const ground = new THREE.Mesh(geo, mat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- MODELLEME: ÇİÇEK OLUŞTURUCU ---
        const flowers = [];
        const petalColors = [0xe74c3c, 0xf1c40f, 0x9b59b6, 0xff00ff, 0x3498db];

        function createAdvancedFlower(x, z) {
            const group = new THREE.Group();
            const color = petalColors[Math.floor(Math.random() * petalColors.length)];

            // Sap
            const stem = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.06, 1, 8),
                new THREE.MeshStandardMaterial({color: 0x27ae60})
            );
            stem.position.y = 0.5;
            group.add(stem);

            // Taç Yapraklar
            const petalGeo = new THREE.SphereGeometry(0.2, 8, 4);
            petalGeo.scale(1, 0.2, 1.5);
            for(let i=0; i<6; i++) {
                const petal = new THREE.Mesh(petalGeo, new THREE.MeshStandardMaterial({color: color}));
                petal.position.y = 1;
                petal.rotation.y = (i * Math.PI * 2) / 6;
                petal.position.x = Math.sin(petal.rotation.y) * 0.15;
                petal.position.z = Math.cos(petal.rotation.y) * 0.15;
                group.add(petal);
            }

            // Orta Kısım
            const center = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 8, 8),
                new THREE.MeshStandardMaterial({color: 0x3e2723})
            );
            center.position.y = 1.05;
            group.add(center);

            group.position.set(x, 0, z);
            group.scale.set(0.01, 0.01, 0.01);
            scene.add(group);

            return { mesh: group, age: 0.1, health: 1.0, maxAge: 0.8 + Math.random() * 0.5 };
        }

        function plantSeed() {
            if(flowers.length >= 40) return;
            const x = (Math.random() - 0.5) * 24;
            const z = (Math.random() - 0.5) * 24;
            flowers.push(createAdvancedFlower(x, z));
            document.getElementById('fCount').innerText = flowers.length;
        }

        function giveWater() {
            flowers.forEach(f => { f.health = Math.min(1.2, f.health + 0.3); });
        }

        // --- KELEBEKLER ---
        const bData = [];
        const bContainer = document.getElementById('butterfly-container');

        for(let i=0; i<8; i++) {
            const div = document.createElement('div');
            div.className = 'b-wrapper';
            div.innerHTML = `<div class="b-body"><svg class="wing l"><use xlink:href="#w-shape"></use></svg><svg class="wing r"><use xlink:href="#w-shape"></use></svg></div>`;
            bContainer.appendChild(div);
            bData.push({
                el: div,
                pos: new THREE.Vector3((Math.random()-0.5)*20, 4, (Math.random()-0.5)*20),
                seed: Math.random() * 100
            });
        }

        // --- DÖNGÜ ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Saat
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');

            // Çiçek Güncelleme (Sınırlandırılmış Büyüme)
            let totalH = 0;
            flowers.forEach(f => {
                if(f.age < f.maxAge) f.age += 0.002;
                f.health = Math.max(0.3, f.health - 0.0002);
                const s = f.age * f.health;
                f.mesh.scale.set(s, s, s);
                totalH += f.health;
            });
            document.getElementById('hp').innerText = flowers.length ? Math.round((totalH/flowers.length)*100) : 0;

            // Kelebekler
            bData.forEach((b, i) => {
                b.pos.x += Math.sin(time + b.seed) * 0.05;
                b.pos.z += Math.cos(time + b.seed) * 0.05;
                b.pos.y = 4 + Math.sin(time * 2 + i) * 1.5;

                const proj = b.pos.clone().project(camera);
                const x = (proj.x + 1) * window.innerWidth / 2;
                const y = (-proj.y + 1) * window.innerHeight / 2;

                if(proj.z < 1) {
                    b.el.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(${0.8/proj.z})`;
                    b.el.style.opacity = 1;
                } else { b.el.style.opacity = 0; }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
