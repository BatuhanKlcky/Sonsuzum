<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title> Sanal Bahçe </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #020205; }
        .ui-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 340px; z-index: 1000; }
        .ui-panel { background: rgba(10, 15, 25, 0.98); padding: 20px; border-radius: 25px; color: white; text-align: center; border: 1px solid rgba(0, 212, 255, 0.15); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        button { border: none; padding: 14px; border-radius: 15px; color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        #status-bar { position: fixed; top: 10px; width: 100%; text-align: center; color: #ff4757; font-size: 12px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="status-bar"></div>
    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock" style="font-size:24px; color:#00d4ff">00:00</div>
            <div style="font-size:10px; color:#666">NEM: %<span id="hp">0</span> | BİTKİ: <span id="fCount">0</span></div>
            <div class="controls">
                <button class="btn-water" onclick="waterAll()">💧 SULA</button>
                <button class="btn-seed" onclick="plant()">🌱 TOHUM</button>
            </div>
        </div>
    </div>

    <script>
        // --- AYARLAR VE KAYIT ---
        const SAVE_KEY = "finalv1";
        const flowers = [];
        const pests = [];

        function checkStorage() {
            try {
                localStorage.setItem('test', '1');
                localStorage.removeItem('test');
                return true;
            } catch(e) {
                document.getElementById('status-bar').innerText = "⚠️ DİKKAT: TARAYICI KAYIT YAPMANI ENGELLİYOR! (Dosyayı bir sunucuda açmalısın)";
                return false;
            }
        }

        function save() {
            if(!checkStorage()) return;
            const data = {
                t: Date.now(),
                p: flowers.map(f => ({ x: f.mesh.position.x, z: f.mesh.position.z, h: f.h, b: f.b, w: f.w, c: f.c }))
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        }

        function load() {
            const raw = localStorage.getItem(SAVE_KEY);
            if(!raw) return;
            const data = JSON.parse(raw);
            data.p.forEach(p => createFlower(p.x, p.z, p));
        }

        // --- THREE.JS KURULUM ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 20);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.CircleGeometry(16, 64), new THREE.MeshStandardMaterial({ color: 0x080808 }));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // --- MODELLER ---
        function createFlower(x, z, s = null) {
            const group = new THREE.Group();
            const color = s ? s.c : [0xff4d6d, 0xffd166, 0x06d6a0][Math.floor(Math.random()*3)];
            
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.08, 1), new THREE.MeshStandardMaterial({color: 0x2d6a4f}));
            stem.position.y = 0.5; group.add(stem);

            const petals = new THREE.Group();
            const pGeo = new THREE.SphereGeometry(0.2, 8, 4);
            pGeo.scale(1, 0.2, 1.5); pGeo.translate(0, 0, 0.5);
            for(let i=0; i<6; i++) {
                const p = new THREE.Mesh(pGeo, new THREE.MeshStandardMaterial({color: color}));
                p.position.y = 1; p.rotation.y = (i * Math.PI)/3; p.rotation.x = Math.PI/2;
                petals.add(p);
            }
            petals.scale.set(0.1, 0.1, 0.1); group.add(petals);
            group.position.set(x, 0, z);
            scene.add(group);

            const fObj = { mesh: group, petals, h: s?s.h:0.1, b: s?s.b:0, w: s?s.w:1.2, c: color };
            flowers.push(fObj);
            document.getElementById('fCount').innerText = flowers.length;
            save();
        }

        function createPest(x, z) {
            const group = new THREE.Group();
            const m = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            // Gövde + Kafa + Bacaklar
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), m);
            body.scale.set(1.2, 0.8, 1.4); body.position.y = 0.15; group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.15), m);
            head.position.set(0, 0.2, 0.4); group.add(head);
            [ [0.2,0.1,0.2], [-0.2,0.1,0.2], [0.2,0.1,-0.2], [-0.2,0.1,-0.2] ].forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3), m);
                leg.position.set(pos[0], pos[1], pos[2]); group.add(leg);
            });
            group.position.set(x, 0, z); scene.add(group);
            return group;
        }

        window.plant = () => createFlower((Math.random()-0.5)*25, (Math.random()-0.5)*25);
        window.waterAll = () => { flowers.forEach(f => f.w = 1.5); save(); };

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            flowers.forEach(f => {
                f.w = Math.max(0, f.w - 0.00002);
                if(f.w > 1.0 && f.h < 1.3) f.h += 0.00001;
                if(f.h > 0.8) f.b = Math.min(1, f.b + 0.01);
                f.petals.scale.set(f.b, f.b, f.b);
                const s = f.h * Math.min(1, f.w + 0.2); f.mesh.scale.set(s,s,s);
            });

            if(Math.random() < 0.0006 && flowers.length > 0 && pests.length < 5) {
                pests.push({ m: createPest((Math.random()-0.5)*30, (Math.random()-0.5)*30), t: flowers[Math.floor(Math.random()*flowers.length)] });
            }

            pests.forEach(p => {
                const d = p.t.mesh.position.clone().sub(p.m.position);
                if(d.length() > 0.4) { p.m.lookAt(p.t.mesh.position); p.m.rotation.y += Math.PI; p.m.position.add(d.normalize().multiplyScalar(0.02)); }
            });

            document.getElementById('hp').innerText = flowers.length ? Math.round((flowers.reduce((a,b)=>a+b.w,0)/flowers.length)*100) : 0;
            controls.update(); renderer.render(scene, camera);
        }

        window.addEventListener('load', load);
        animate();
    </script>
</body>
</html>
