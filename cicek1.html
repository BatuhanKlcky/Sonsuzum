<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanal Bahçe 3D - Lite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        
        .ui-panel {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px);
            padding: 15px; border-radius: 15px; color: white;
            z-index: 100; text-align: center; width: 260px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .water-btn {
            background: #00d4ff; border: none; width: 100%; padding: 12px;
            border-radius: 10px; color: white; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }
        #info { font-size: 11px; margin-top: 5px; color: #00d4ff; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 id="clock">00:00</h2>
        <div style="font-size: 14px; margin: 5px 0;">Sağlık: %<span id="hp">--</span></div>
        <button id="wBtn" class="water-btn" onclick="giveWater()">💧 CAN SUYU VER</button>
        <p id="info"></p>
    </div>

    <script>
        let gData = { h: 1.0, last: Date.now(), total: 0 };
        const saved = localStorage.getItem('garden_3d_lite');
        if(saved) gData = JSON.parse(saved);

        // --- OPTİMİZE EDİLMİŞ RENDERER ---
        const renderer = new THREE.WebGLRenderer({ 
            antialias: false, // Performans için kapatıldı
            powerPreference: "high-performance" 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // Piksel oranını 2 ile sınırla (4K ekranlarda kasmaması için)
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 7);
        camera.lookAt(0, 1, 0);

        // Basit Işıklandırma
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 5, 2);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // Zemin
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshLambertMaterial({ color: 0x153315 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- DÜŞÜK POLİGONLU ÇİÇEKLER ---
        const flowers = [];
        const createFlower = (x, z, color) => {
            const group = new THREE.Group();
            // Sap (8 yüzeyden 5 yüzeye düşürüldü)
            const stem = new THREE.Mesh(
                new THREE.CylinderGeometry(0.05, 0.05, 2, 5),
                new THREE.MeshLambertMaterial({ color: 0x2ecc71 })
            );
            stem.position.y = 1;
            group.add(stem);

            // Orta kısım
            const center = new THREE.Mesh(
                new THREE.SphereGeometry(0.18, 6, 6),
                new THREE.MeshLambertMaterial({ color: 0xffaa00 })
            );
            center.position.y = 2;
            group.add(center);

            // Yapraklar (Basit kutu veya düzlem kullanılabilir ama sphere kalsın - düşük poly)
            const petalGeo = new THREE.SphereGeometry(0.12, 5, 5);
            petalGeo.scale(1, 2.5, 0.2);
            const petalMat = new THREE.MeshLambertMaterial({ color: color });
            
            for(let i=0; i<6; i++) { // 8 yapraktan 6'ya düşürüldü
                const petal = new THREE.Mesh(petalGeo, petalMat);
                petal.position.y = 2;
                const angle = (i / 6) * Math.PI * 2;
                petal.position.x = Math.cos(angle) * 0.25;
                petal.position.z = Math.sin(angle) * 0.25;
                petal.rotation.y = -angle;
                petal.rotation.z = 0.6;
                group.add(petal);
            }

            group.position.set(x, 0, z);
            scene.add(group);
            return group;
        };

        flowers.push(createFlower(-2.2, 0, 0xff2244));
        flowers.push(createFlower(0, -0.5, 0xffdd00));
        flowers.push(createFlower(2.2, 0, 0x00ccff));

        function update() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            const diff = (Date.now() - gData.last) / 3600000;
            let currentH = Math.max(0.3, gData.h - (diff * 0.02));
            
            document.getElementById('hp').textContent = Math.round(currentH * 100);
            
            flowers.forEach((f, i) => {
                f.scale.set(currentH, currentH, currentH);
                // Hareketleri sadece render döngüsünde yapıyoruz
            });

            // Gece-Gündüz Arkaplanı
            const isDay = now.getHours() >= 6 && now.getHours() < 19;
            scene.background = new THREE.Color(isDay ? 0x66ccff : 0x050510);
            document.getElementById('info').textContent = isDay ? "Gündüz ☀️" : "Gece ✨";
        }

        function giveWater() {
            if(parseFloat(document.getElementById('hp').textContent) >= 150) return;
            gData.h = Math.min(1.5, gData.h + 0.1);
            gData.last = Date.now();
            localStorage.setItem('garden_3d_lite', JSON.stringify(gData));
            update();
        }

        function animate() {
            requestAnimationFrame(animate);
            // Çiçeklere çok hafif bir salınım ver (İşlemciyi yormaz)
            const time = Date.now() * 0.001;
            flowers.forEach((f, i) => {
                f.rotation.z = Math.sin(time + i) * 0.03;
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setInterval(update, 1000);
        update();
        animate();
    </script>
</body>
</html>
