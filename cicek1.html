<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Pro Sanal Bahçe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #111; }
        
        /* Glassmorphism UI */
        .ui-panel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px; border-radius: 30px; color: white;
            z-index: 100; text-align: center; width: 320px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .water-btn {
            background: linear-gradient(135deg, #00d4ff, #0056b3);
            border: none; width: 100%; padding: 15px;
            border-radius: 20px; color: white; font-weight: bold; font-size: 16px;
            cursor: pointer; margin-top: 15px; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .water-btn:active { transform: scale(0.95); }
        
        #stats { display: flex; justify-content: space-around; margin-top: 10px; font-size: 14px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 id="clock">00:00</h2>
        <div id="stats">
            <div class="stat-box">Sağlık: <b>%<span id="hp">100</span></b></div>
            <div class="stat-box">Sulama: <b><span id="count">0</span></b></div>
        </div>
        <button id="wBtn" class="water-btn" onclick="giveWater()">💧 Can Suyu Ver</button>
    </div>

    <script>
        let gData = { h: 1.0, last: Date.now(), total: 0 };
        const saved = localStorage.getItem('garden_3d_pro');
        if(saved) gData = JSON.parse(saved);

        // --- SAHNE KURULUMU ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.Fog(0x0a0a0f, 10, 25);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.1; // Yerin altına girmeyi engelle

        // Işıklar
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(5, 10, 5);
        scene.add(sunLight);

        // Zemin Tasarımı
        const groundGeo = new THREE.CylinderGeometry(6, 6, 0.5, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.y = -0.25;
        scene.add(ground);

        const grid = new THREE.GridHelper(12, 20, 0x00d4ff, 0x222222);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- GELİŞMİŞ ÇİÇEK MODELLEME ---
        const flowers = [];
        function createProFlower(x, z, petalColor) {
            const group = new THREE.Group();
            
            // Sap (Kıvrımlı görünüm için 2 parça)
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x2ecc71 });
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.1, 3, 8), stemMat);
            stem.position.y = 1.5;
            group.add(stem);

            // Yapraklar (Stem üzerinde)
            const leafGeo = new THREE.SphereGeometry(0.2, 8, 8);
            leafGeo.scale(2, 0.5, 1);
            const leaf1 = new THREE.Mesh(leafGeo, stemMat);
            leaf1.position.set(0.2, 1, 0);
            leaf1.rotation.z = 0.5;
            group.add(leaf1);

            // Çiçek Kafası
            const headGroup = new THREE.Group();
            headGroup.position.y = 3;

            // Merkez
            const center = new THREE.Mesh(
                new THREE.IcosahedronGeometry(0.25, 1),
                new THREE.MeshStandardMaterial({ color: 0xffaa00 })
            );
            headGroup.add(center);

            // Petaller (Daha organik durması için koni/piramit yapısı)
            const petalGeo = new THREE.ConeGeometry(0.15, 0.8, 4);
            petalGeo.translate(0, 0.4, 0);
            const petalMat = new THREE.MeshStandardMaterial({ color: petalColor, flatShading: true });

            for(let i=0; i<10; i++) {
                const p = new THREE.Mesh(petalGeo, petalMat);
                const angle = (i / 10) * Math.PI * 2;
                p.rotation.x = Math.PI / 2;
                p.rotation.z = angle;
                headGroup.add(p);
            }

            group.add(headGroup);
            group.position.set(x, 0, z);
            scene.add(group);
            return { group, headGroup };
        }

        flowers.push(createProFlower(-2.5, 1, 0xff2d55)); // Rose
        flowers.push(createProFlower(0, -1.5, 0xffcc00)); // Sunflower
        flowers.push(createProFlower(2.5, 1, 0x007aff)); // Blue

        // --- LOGIC ---
        function update() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});

            const diff = (Date.now() - gData.last) / 3600000;
            let currentH = Math.max(0.4, gData.h - (diff * 0.03));
            
            document.getElementById('hp').textContent = Math.round(currentH * 100);
            document.getElementById('count').textContent = gData.total;

            flowers.forEach(f => {
                f.group.scale.set(currentH, currentH, currentH);
            });

            // Gece-Gündüz Efekti
            const isDay = now.getHours() >= 6 && now.getHours() < 19;
            const targetColor = isDay ? new THREE.Color(0x1a2a44) : new THREE.Color(0x050508);
            scene.background.lerp(targetColor, 0.01);
            sunLight.intensity = isDay ? 1.0 : 0.2;
        }

        function giveWater() {
            if(parseFloat(document.getElementById('hp').textContent) >= 150) return;
            gData.h = Math.min(1.5, gData.h + 0.1);
            gData.last = Date.now();
            gData.total++;
            localStorage.setItem('garden_3d_pro', JSON.stringify(gData));
            update();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            const time = Date.now() * 0.001;
            flowers.forEach((f, i) => {
                // Rüzgarda sallanma efekti
                f.headGroup.rotation.x = Math.sin(time + i) * 0.1;
                f.headGroup.rotation.z = Math.cos(time + i) * 0.1;
                // Kendi ekseninde çok yavaş dönüş
                f.headGroup.rotation.y += 0.005;
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setInterval(update, 1000);
        update();
        animate();
    </script>
</body>
</html>
