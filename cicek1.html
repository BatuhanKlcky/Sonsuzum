<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Erkut Dincel - 3D Butterfly Garden</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        /* --- TEMEL STİLLER --- */
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; overflow: hidden; background: #050510; }

        /* --- UI PANELİ --- */
        .ui-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 15px; width: 320px; z-index: 1000;
        }
        .ui-panel {
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 30px; color: white;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        button {
            border: none; padding: 14px; border-radius: 18px; color: white; 
            font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 11px; letter-spacing: 1px;
        }
        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        button:active { transform: scale(0.92); }
        #clock { font-size: 22px; font-weight: 300; margin-bottom: 5px; color: #00d4ff; }
        .stat-text { font-size: 12px; color: #aaa; margin-top: 4px; }

        /* --- KELEBEK KATMANI (CSS ENTEGRASYONU) --- */
        #butterfly-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; transform-style: preserve-3d;
        }
        .butterfly-wrapper {
            position: absolute; width: 40px; height: 40px;
            transform-style: preserve-3d; will-change: transform;
        }
        .butterfly {
            position: relative; width: 40px; height: 40px;
            transform-style: preserve-3d; transform: rotateX(50deg);
        }
        .wing {
            position: absolute; width: 20px; height: 40px;
            fill: #ffdf00; filter: drop-shadow(0 0 5px rgba(255,223,0,0.5));
        }
        .wing.left {
            transform-origin: right center;
            animation: left-flap 0.4s ease-in-out infinite;
        }
        .wing.right {
            left: 20px; transform-origin: left center;
            animation: right-flap 0.4s ease-in-out infinite;
        }

        @keyframes left-flap {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(75deg); }
        }
        @keyframes right-flap {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(-75deg); }
        }

        .svg-defs { position: absolute; width: 0; height: 0; }
    </style>
</head>
<body>

    <svg class="svg-defs">
        <symbol id="butterfly-shape" viewBox="0 0 25 50">
            <path d="M25,50 C25,50 0,40 0,25 C0,10 15,0 25,10 L25,50 Z" />
        </symbol>
    </svg>

    <div id="butterfly-layer"></div>

    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock">12:00</div>
            <div class="stat-text">Bahçe Sağlığı: <b>%<span id="hp">0</span></b></div>
            <div class="controls">
                <button class="btn-water" onclick="giveWater()">💧 SULA</button>
                <button class="btn-seed" onclick="plantSeed()">🌱 TOHUM EK</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SAHNE KURULUMU ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x050510, 20, 120);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(18, 15, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.1;

        // Işıklar
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        // Zemin
        const ground = new THREE.Mesh(
            new THREE.CylinderGeometry(15, 15, 0.6, 64),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 })
        );
        ground.position.y = -0.3;
        scene.add(ground);

        // --- 2. ÇİÇEK SİSTEMİ ---
        const flowers = [];
        const colors = [0xff4d6d, 0xffb703, 0x00d4ff, 0x9b59b6, 0x2ecc71];

        function createFlower(x, z, color) {
            const group = new THREE.Group();
            
            // Sap
            const stem = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06, 0.06, 1.2),
                new THREE.MeshStandardMaterial({ color: 0x1b4332 })
            );
            stem.position.y = 0.6;
            group.add(stem);

            // Kafa
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 8, 8),
                new THREE.MeshStandardMaterial({ color: color })
            );
            head.position.y = 1.2;
            group.add(head);

            group.position.set(x, 0, z);
            group.scale.set(0.1, 0.1, 0.1); // Başlangıçta küçük
            scene.add(group);

            return { mesh: group, age: 0.2, health: 1.0 };
        }

        function plantSeed() {
            if(flowers.length > 30) return;
            const x = (Math.random() - 0.5) * 22;
            const z = (Math.random() - 0.5) * 22;
            const color = colors[Math.floor(Math.random() * colors.length)];
            flowers.push(createFlower(x, z, color));
        }

        function giveWater() {
            flowers.forEach(f => { f.health = Math.min(1.5, f.health + 0.4); });
        }

        // --- 3. KELEBEK SİSTEMİ (SENİN CSS'İN) ---
        const butterflyData = [];
        const butterflyLayer = document.getElementById('butterfly-layer');

        function spawnButterfly() {
            const wrapper = document.createElement('div');
            wrapper.className = 'butterfly-wrapper';
            wrapper.innerHTML = `
                <div class="butterfly">
                    <svg class="wing left"><use xlink:href="#butterfly-shape"></use></svg>
                    <svg class="wing right"><use xlink:href="#butterfly-shape"></use></svg>
                </div>
            `;
            butterflyLayer.appendChild(wrapper);

            return {
                element: wrapper,
                worldPos: new THREE.Vector3(
                    (Math.random() - 0.5) * 20,
                    5 + Math.random() * 5,
                    (Math.random() - 0.5) * 20
                ),
                offset: Math.random() * 100,
                speed: 0.001 + Math.random() * 0.002
            };
        }

        for(let i=0; i<6; i++) butterflyData.push(spawnButterfly());

        // --- 4. ANİMASYON DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now();

            // Saat ve Gece Gündüz
            const date = new Date();
            document.getElementById('clock').textContent = date.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            const isDay = date.getHours() >= 6 && date.getHours() < 20;
            scene.background = new THREE.Color(isDay ? 0x87ceeb : 0x050510);
            sun.intensity = isDay ? 1.2 : 0.1;

            // Çiçekleri Güncelle
            let totalH = 0;
            flowers.forEach(f => {
                if(f.age < 1.0) f.age += 0.001;
                f.health = Math.max(0.2, f.health - 0.0001);
                const s = f.age * f.health;
                f.mesh.scale.set(s, s, s);
                totalH += f.health;
            });
            document.getElementById('hp').textContent = flowers.length ? Math.round((totalH/flowers.length)*100) : 0;

            // Kelebekleri 3D'ye Sabitle
            butterflyData.forEach((b, i) => {
                // Hareket
                b.worldPos.x += Math.sin(time * b.speed + b.offset) * 0.1;
                b.worldPos.z += Math.cos(time * b.speed + b.offset) * 0.1;
                b.worldPos.y = 5 + Math.sin(time * 0.002 + i) * 2;

                // 3D -> 2D İzdüşüm
                const screenPos = b.worldPos.clone().project(camera);
                
                if(screenPos.z < 1) { // Kamera arkasında değilse
                    const x = (screenPos.x + 1) * window.innerWidth / 2;
                    const y = (-screenPos.y + 1) * window.innerHeight / 2;
                    const distScale = 1 / (screenPos.z + 0.5);
                    b.element.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(${distScale})`;
                    b.element.style.opacity = 1;
                } else {
                    b.element.style.opacity = 0;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
