<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Botanik Bahçesi v6 - Doğa Manzaralı</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #000; }
        
        .ui-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; width: 340px; z-index: 100;
        }

        .ui-panel {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 25px; color: white;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        button {
            border: none; padding: 12px; border-radius: 15px; color: white; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 11px;
        }

        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-water:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        button:active:not(:disabled) { transform: scale(0.95); }
        
        #clock { font-size: 18px; letter-spacing: 2px; margin-bottom: 5px; color: #00d4ff; }
        .stat-text { font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock">00:00</div>
            <div class="stat-text">Bahçe Sağlığı: <b>%<span id="hp">0</span></b></div>
            <div class="stat-text" style="color:#ff6b6b">Zararlı: <span id="pests-count">0</span></div>
            <div class="controls">
                <button id="wBtn" class="btn-water" onclick="giveWater()">💧 Sula</button>
                <button class="btn-seed" onclick="plantSeed()">🌱 Tohum Ek</button>
            </div>
        </div>
    </div>

    <script>
        // --- AYARLAR ---
        const MAX_HEALTH = 1.5; 
        const HOURLY_DECAY = 0.02; 
        const PEST_SPAWN_CHANCE = 0.001; // %0.5'ten %0.1'e düşürüldü (Daha yavaş)
        let lastFrameTime = Date.now();
        let gData = { flowers: [], lastWater: Date.now() };

        const saved = localStorage.getItem('garden_v6_data');
        if(saved) gData = JSON.parse(saved);

        // --- SAHNE VE ARKA PLAN ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x1a2a44, 10, 50); // Derinlik için sis

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 5;
        controls.maxDistance = 40;

        // Işıklar
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(20, 40, 20);
        scene.add(sun);
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        // --- ÇEVRE TASARIMI (YENİ) ---
        // Gökyüzü Kubbesi
        const skyGeo = new THREE.SphereGeometry(100, 32, 32);
        const skyMat = new THREE.MeshBasicMaterial({ color: 0x87ceeb, side: THREE.BackSide });
        const sky = new THREE.Mesh(skyGeo, skyMat);
        scene.add(sky);

        // Uzak Dağlar
        function createMountains() {
            const mtnGroup = new THREE.Group();
            const mtnGeo = new THREE.ConeGeometry(8, 15, 4);
            const mtnMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, flatShading: true });
            
            for(let i=0; i<12; i++) {
                const m = new THREE.Mesh(mtnGeo, mtnMat);
                const angle = (i / 12) * Math.PI * 2;
                const dist = 40 + Math.random() * 10;
                m.position.set(Math.cos(angle)*dist, -2, Math.sin(angle)*dist);
                m.scale.y = 0.5 + Math.random();
                m.rotation.y = Math.random();
                mtnGroup.add(m);
            }
            scene.add(mtnGroup);
            return mtnMat;
        }
        const mountainMaterial = createMountains();

        // Bahçe Zemini
        const ground = new THREE.Mesh(
            new THREE.CylinderGeometry(10, 11, 0.8, 6), // Altıgen zemin
            new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 1 })
        );
        scene.add(ground);

        // Yıldızlar
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for(let i=0; i<2000; i++) starCoords.push((Math.random()-0.5)*200, Math.random()*100, (Math.random()-0.5)*200);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.15}));
        scene.add(stars);

        // --- ÇİÇEK VE BÖCEK SİSTEMİ ---
        const flowerMeshes = [];
        const pests = [];
        const colors = [0xff4d6d, 0xffb703, 0x219ebc, 0x9b59b6, 0x2ecc71];

        function createFlowerMesh(data) {
            const group = new THREE.Group();
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.1, 1, 6), new THREE.MeshStandardMaterial({ color: 0x2d6a4f }));
            stem.position.y = 0.5;
            group.add(stem);

            const head = new THREE.Group();
            const petalMat = new THREE.MeshStandardMaterial({ color: data.color, flatShading: true });
            for(let i=0; i<6; i++) {
                const petal = new THREE.Mesh(new THREE.SphereGeometry(0.2, 5, 5), petalMat);
                petal.scale.set(1.5, 0.3, 0.8);
                petal.position.y = 1;
                const angle = (i / 6) * Math.PI * 2;
                petal.position.x = Math.cos(angle) * 0.3;
                petal.position.z = Math.sin(angle) * 0.3;
                petal.rotation.y = -angle;
                head.add(petal);
            }
            group.add(head);
            group.position.set(data.x, 0, data.z);
            scene.add(group);
            return { mesh: group, stem: stem, head: head, data: data };
        }

        function createPest() {
            const p = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), new THREE.MeshStandardMaterial({color:0xff3333}));
            p.position.set((Math.random()-0.5)*15, 2, (Math.random()-0.5)*15);
            p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.04, 0, (Math.random()-0.5)*0.04), esc: false };
            scene.add(p);
            pests.push(p);
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(pests);
            if(intersects.length > 0) {
                intersects[0].object.userData.esc = true;
                intersects[0].object.userData.vel.set(0, 0.3, 0);
            }
        });

        function plantSeed() {
            if(gData.flowers.length >= 15) return;
            const f = { x:(Math.random()-0.5)*16, z:(Math.random()-0.5)*16, color:colors[Math.floor(Math.random()*colors.length)], age:0.2, health:1.0 };
            gData.flowers.push(f);
            flowerMeshes.push(createFlowerMesh(f));
            save();
        }

        function giveWater() { gData.flowers.forEach(f => f.health = Math.min(MAX_HEALTH, f.health + 0.25)); save(); }
        function save() { localStorage.setItem('garden_v6_data', JSON.stringify(gData)); }

        gData.flowers.forEach(f => flowerMeshes.push(createFlowerMesh(f)));

        // --- ANA DÖNGÜ ---
        function animate() {
            requestAnimationFrame(animate);
            const now = new Date();
            const nowTime = Date.now();
            const deltaTime = (nowTime - lastFrameTime) / 1000;
            lastFrameTime = nowTime;

            document.getElementById('clock').textContent = now.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            // Gündüz/Gece Renkleri
            const hr = now.getHours();
            const isDay = hr >= 6 && hr < 19;
            const targetSky = isDay ? 0x87ceeb : 0x050510;
            const targetFog = isDay ? 0xaaddee : 0x050510;
            
            sky.material.color.lerp(new THREE.Color(targetSky), 0.01);
            scene.fog.color.lerp(new THREE.Color(targetFog), 0.01);
            stars.visible = !isDay;
            sun.intensity = isDay ? 1.2 : 0.1;
            mountainMaterial.color.lerp(new THREE.Color(isDay ? 0x2c3e50 : 0x0a0a15), 0.01);

            let totalH = 0;
            flowerMeshes.forEach((fm, i) => {
                fm.data.health = Math.max(0.3, fm.data.health - (HOURLY_DECAY/3600 * deltaTime));
                if(fm.data.age < 1.0) fm.data.age += 0.0001 * deltaTime;
                const s = fm.data.age * fm.data.health;
                fm.mesh.scale.set(s, s, s);
                fm.mesh.rotation.x = Math.sin(nowTime*0.001 + i) * 0.03;
                totalH += (fm.data.health / MAX_HEALTH);
            });

            pests.forEach((p, i) => {
                p.position.add(p.userData.vel);
                if(p.userData.esc && p.position.y > 20) { scene.remove(p); pests.splice(i,1); }
                else if(!p.userData.esc && p.position.length() > 15) p.userData.vel.negate();
            });

            if(Math.random() < PEST_SPAWN_CHANCE) createPest();

            document.getElementById('hp').textContent = flowerMeshes.length > 0 ? Math.round((totalH/flowerMeshes.length)*100) : 0;
            document.getElementById('pests-count').textContent = pests.length;

            const wBtn = document.getElementById('wBtn');
            wBtn.disabled = (flowerMeshes.length === 0);
            wBtn.textContent = (flowerMeshes.length === 0) ? "🌱 TOHUM EK" : "💧 SULA";

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
