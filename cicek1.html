<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Botanik Bahçesi v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #050505; }
        
        .ui-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; width: 340px; z-index: 100;
        }

        .ui-panel {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 25px; color: white;
            text-align: center; border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        button {
            border: none; padding: 12px; border-radius: 15px; color: white; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 12px;
        }

        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        button:active { transform: scale(0.95); }
        
        #clock { font-size: 20px; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.9; }
        .stat-text { font-size: 13px; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock">00:00</div>
            <div class="stat-text">Bahçe Sağlığı: <span id="hp" style="color:white; font-weight:bold;">100</span>%</div>
            <div class="controls">
                <button class="btn-water" onclick="giveWater()">💧 Sula</button>
                <button class="btn-seed" onclick="plantSeed()">🌱 Tohum Ek</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & STATE ---
        let gData = { 
            flowers: [], // {x, z, type, health, age, color}
            lastWater: Date.now()
        };
        const saved = localStorage.getItem('garden_v3_data');
        if(saved) gData = JSON.parse(saved);

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.1;

        // --- LIGHTS & ENV ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // Yıldızlar
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for(let i=0; i<2000; i++) {
            starCoords.push((Math.random()-0.5)*100, Math.random()*50, (Math.random()-0.5)*100);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1}));
        scene.add(stars);

        // Zemin (Modern Estetik)
        const ground = new THREE.Mesh(
            new THREE.CylinderGeometry(8, 8, 0.4, 64),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 })
        );
        ground.receiveShadow = true;
        scene.add(ground);

        // --- FLOWER LOGIC ---
        const flowerMeshes = [];
        const colors = [0xff2d55, 0xffcc00, 0x007aff, 0x9b59b6, 0xe67e22];

        function createFlowerMesh(data) {
            const group = new THREE.Group();
            
            // Sap (Büyümeye duyarlı)
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x2ecc71 });
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.07, 1, 8), stemMat);
            stem.position.y = 0.5;
            group.add(stem);

            // Çiçek Kafası (Sadece yaşlıysa görünür)
            const head = new THREE.Group();
            head.position.y = 1;
            
            const center = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), new THREE.MeshStandardMaterial({color: 0x442200}));
            head.add(center);

            const petalMat = new THREE.MeshStandardMaterial({ color: data.color, flatShading: true });
            for(let i=0; i<8; i++) {
                const petal = new THREE.Mesh(new THREE.SphereGeometry(0.2, 6, 6), petalMat);
                petal.scale.set(1, 0.2, 2.5);
                const angle = (i/8) * Math.PI * 2;
                petal.position.x = Math.sin(angle) * 0.25;
                petal.position.z = Math.cos(angle) * 0.25;
                petal.rotation.y = angle;
                head.add(petal);
            }
            group.add(head);

            group.position.set(data.x, 0, data.z);
            scene.add(group);
            return { mesh: group, stem: stem, head: head, data: data };
        }

        function plantSeed() {
            if(gData.flowers.length > 15) return; // Limit
            const newFlower = {
                x: (Math.random() - 0.5) * 10,
                z: (Math.random() - 0.5) * 10,
                color: colors[Math.floor(Math.random() * colors.length)],
                age: 0.1, // 0.1'den 1.0'e kadar büyüme
                health: 1.0
            };
            gData.flowers.push(newFlower);
            flowerMeshes.push(createFlowerMesh(newFlower));
            save();
        }

        function giveWater() {
            gData.flowers.forEach(f => f.health = Math.min(1.5, f.health + 0.2));
            gData.lastWater = Date.now();
            save();
        }

        function save() {
            localStorage.setItem('garden_v3_data', JSON.stringify(gData));
        }

        // Başlangıçta yükle
        gData.flowers.forEach(f => flowerMeshes.push(createFlowerMesh(f)));

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const hr = new Date().getHours();
            const isDay = hr >= 6 && hr < 19;

            // Zaman & UI
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            // Gökyüzü & Işık Döngüsü
            const skyColor = isDay ? new THREE.Color(0x87ceeb) : new THREE.Color(0x020205);
            scene.background = skyColor;
            stars.visible = !isDay;
            sun.intensity = isDay ? 1.0 : 0.1;
            ambientLight.intensity = isDay ? 0.4 : 0.1;

            // Çiçek Güncelleme
            let totalH = 0;
            flowerMeshes.forEach((fm, i) => {
                // Büyüme mantığı
                if(fm.data.age < 1) fm.data.age += 0.001;
                
                // Sağlık düşüşü (Su verilmezse)
                const diff = (Date.now() - gData.lastWater) / 3600000;
                fm.data.health = Math.max(0.2, fm.data.health - (diff * 0.0001));
                totalH += fm.data.health;

                // Görselleştirme
                const s = fm.data.age * fm.data.health;
                fm.mesh.scale.set(s, s, s);
                fm.stem.scale.y = 1 + fm.data.age; // Sap uzasın
                fm.head.position.y = fm.stem.scale.y;
                
                // Rüzgar sallantısı
                fm.mesh.rotation.z = Math.sin(time + i) * 0.05 * fm.data.age;
            });

            if(flowerMeshes.length > 0) {
                document.getElementById('hp').textContent = Math.round((totalH / flowerMeshes.length) * 100);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
