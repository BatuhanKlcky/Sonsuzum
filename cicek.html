  const client = supabase.createClient(supabaseUrl, supabaseKey);

  let visitStart = Date.now();

  fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(async d=>{

    const ua=navigator.userAgent,ip=d.ip,page=location.href,res=screen.width+'x'+screen.height;

    await client.from('visitor_logs').insert([{page_url:page,ip_address:ip,user_agent:ua,screen_resolution:res,time_spent:0}]);

    window.addEventListener('beforeunload',async()=>{

      await client.from('visitor_logs').insert([{page_url:page,ip_address:ip,user_agent:ua,screen_resolution:res,time_spent:Math.floor((Date.now()-visitStart)/1000)}]);

    });

  });

</script>
