<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanal Bahçe - Premium + Evcil Hayvanlar + Gelişmiş Kelebekler</title>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        :root {
            --growth: 1;
            --health-color: 1;
            --sky-1: #000811;
            --sky-2: #001a33;
        }

        body {
            background: linear-gradient(to top, var(--sky-2), var(--sky-1));
            height: 100vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            transition: all 2s ease;
        }

        /* --- UI PANELİ --- */
        .ui-panel {
            position: fixed;
            top: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 25px;
            color: white;
            z-index: 100;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            width: 85%;
            max-width: 350px;
        }

        .water-btn {
            background: linear-gradient(45deg, #00d4ff, #008cb3);
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
            margin-top: 10px;
        }

        /* --- ÇİÇEKLER --- */
        .flower_wrapper {
            position: absolute;
            bottom: 40px;
            transform-origin: bottom center;
            transform: scale(var(--growth));
            filter: saturate(var(--health-color)) brightness(var(--health-color));
            transition: transform 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67), filter 2s;
        }

        .f1 { left: 15%; } .f2 { left: 50%; } .f3 { left: 85%; }

        .flower_stem {
            width: 12px;
            height: 55vmin;
            background: linear-gradient(to top, #1a4a2e, #34a853);
            border-radius: 10px;
        }

        .flower_center {
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 12vmin; height: 12vmin;
            border-radius: 50%;
            background: radial-gradient(circle, #4b2c00, #ff8c00);
            z-index: 5;
        }

        .flower_petal {
            position: absolute;
            left: 50%; bottom: 48vmin;
            width: 6vmin; height: 18vmin;
            transform-origin: center bottom;
            border-radius: 50% 50% 20% 20%;
        }

        .rose .flower_petal { background: radial-gradient(circle, #ff0033, #8b0000); }
        .sunflower .flower_petal { background: radial-gradient(circle, #ffcc00, #ff8c00); }
        .blue .flower_petal { background: radial-gradient(circle, #00d4ff, #0056b3); }

        /* Yaprak rotasyonları */
        .p1 { transform: translateX(-50%) rotate(0deg); }
        .p2 { transform: translateX(-50%) rotate(45deg); }
        .p3 { transform: translateX(-50%) rotate(90deg); }
        .p4 { transform: translateX(-50%) rotate(135deg); }
        .p5 { transform: translateX(-50%) rotate(180deg); }
        .p6 { transform: translateX(-50%) rotate(225deg); }
        .p7 { transform: translateX(-50%) rotate(270deg); }
        .p8 { transform: translateX(-50%) rotate(315deg); }

        /* --- KEDİ VE KUŞ ANİMASYONLARI --- */
        .cat {
            position: absolute;
            bottom: 10px; left: 10px;
            width: 50px; height: 50px;
            background: #333; /* Siyah kedi */
            border-radius: 50% 50% 0 0;
            z-index: 10;
        }
        .cat::after { /* Kuyruk */
            content: '';
            position: absolute;
            bottom: 0; right: -10px;
            width: 10px; height: 30px;
            background: #333;
            border-radius: 0 5px 5px 0;
            transform-origin: bottom left;
            animation: tail-wag 2s infinite alternate;
        }
        @keyframes tail-wag { to { transform: rotate(20deg); } }

        .bird {
            position: absolute;
            top: 20%; left: -50px;
            width: 20px; height: 15px;
            background: #00d4ff; /* Mavi kuş */
            border-radius: 50%;
            z-index: 5;
            animation: bird-fly 10s infinite linear;
        }
        .bird::after { /* Kanat */
            content: '';
            position: absolute;
            top: -5px; left: 5px;
            width: 10px; height: 10px;
            background: #00d4ff;
            border-radius: 50%;
            animation: wing-flap 0.2s infinite alternate;
        }
        @keyframes bird-fly { to { left: 110%; } }
        @keyframes wing-flap { to { transform: translateY(-5px); } }

        /* --- GELİŞMİŞ KELEBEK ANİMASYONU --- */
        .svg-defs {
            position: absolute;
            width: 0;
            height: 0;
        }

        .butterfly_container {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 100px;
            height: 100px;
            margin-left: -50px;
            margin-top: -50px;
            transform-style: preserve-3d;
            animation: butterfly-anim 20s infinite linear;
        }

        .butterfly {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 50px;
            height: 50px;
            margin-left: -25px;
            margin-top: -25px;
            transform-style: preserve-3d;
            animation: butterfly-flap 1s infinite alternate ease-in-out;
        }

        .wing {
            position: absolute;
            width: 50px;
            height: 50px;
            transform-style: preserve-3d;
        }

        .wing.left {
            transform: rotateY(-30deg);
        }

        .wing.right {
            transform: rotateY(30deg);
        }

        @keyframes butterfly-anim {
            0% { transform: translate(-100px, 0) rotateY(0deg) scale(0.5); }
            25% { transform: translate(100px, -50px) rotateY(90deg) scale(0.7); }
            50% { transform: translate(50px, -100px) rotateY(180deg) scale(1); }
            75% { transform: translate(-100px, -50px) rotateY(270deg) scale(0.7); }
            100% { transform: translate(-100px, 0) rotateY(360deg) scale(0.5); }
        }

        @keyframes butterfly-flap {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(30deg); }
        }

    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="cat"></div>
    <div class="bird"></div>

    <div class="butterfly_container">
        <figure class="butterfly">
            <svg class="wing left" viewBox="0 0 50 100">
                <use xlink:href="#shape-butterfly-1"></use>
            </svg>
            <svg class="wing right" viewBox="0 0 50 100">
                <use xlink:href="#shape-butterfly-1"></use>
            </svg>
        </figure>
    </div>

    <div class="ui-panel">
        <h2 id="time-txt">00:00</h2>
        <p id="status" style="margin: 5px 0; font-size: 0.9rem; opacity: 0.8;">Bahçen Dinleniyor...</p>
        <div style="margin: 10px 0;">Sağlık: %<span id="hp">100</span></div>
        <button class="water-btn" onclick="giveWater()">💧 CAN SUYU VER</button>
        <p id="advice" style="font-size: 0.75rem; margin-top: 8px; color: #00d4ff;"></p>
    </div>

    <div id="garden">
        <div class="flower_wrapper rose f1">
            <div class="flower_stem"></div><div class="flower_center"></div>
            <div class="flower_petal p1"></div><div class="flower_petal p2"></div><div class="flower_petal p3"></div><div class="flower_petal p4"></div><div class="flower_petal p5"></div><div class="flower_petal p6"></div><div class="flower_petal p7"></div><div class="flower_petal p8"></div>
        </div>
        <div class="flower_wrapper sunflower f2">
            <div class="flower_stem"></div><div class="flower_center"></div>
            <div class="flower_petal p1"></div><div class="flower_petal p2"></div><div class="flower_petal p3"></div><div class="flower_petal p4"></div><div class="flower_petal p5"></div><div class="flower_petal p6"></div><div class="flower_petal p7"></div><div class="flower_petal p8"></div>
        </div>
        <div class="flower_wrapper blue f3">
            <div class="flower_stem"></div><div class="flower_center"></div>
            <div class="flower_petal p1"></div><div class="flower_petal p2"></div><div class="flower_petal p3"></div><div class="flower_petal p4"></div><div class="flower_petal p5"></div><div class="flower_petal p6"></div><div class="flower_petal p7"></div><div class="flower_petal p8"></div>
        </div>
    </div>

    <script>
        let gardenState = {
            health: 1.0,
            lastWater: Date.now()
        };

        const waterSound = document.getElementById('water-sound');
        waterSound.volume = 0.3;

        function init() {
            const saved = localStorage.getItem('garden_premium_v3');
            if(saved) gardenState = JSON.parse(saved);
            update();
            setInterval(update, 1000);
        }

        function update() {
            const now = new Date();
            document.getElementById('time-txt').textContent = now.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});

            const hoursSince = (Date.now() - gardenState.lastWater) / (1000 * 60 * 60);
            gardenState.health = Math.max(0.2, 1.1 - (hoursSince * 0.01)); 

            const hour = now.getHours();
            const root = document.documentElement;
            if(hour >= 6 && hour < 18) { // Gündüz
                root.style.setProperty('--sky-1', '#1e90ff');
                root.style.setProperty('--sky-2', '#87ceeb');
                document.getElementById('status').textContent = "Güneş Çiçekleri Besliyor ☀️";
            } else { // Gece
                root.style.setProperty('--sky-1', '#000811');
                root.style.setProperty('--sky-2', '#001a33');
                document.getElementById('status').textContent = "Çiçekler Gece Uykusunda ✨";
            }

            root.style.setProperty('--growth', gardenState.health);
            root.style.setProperty('--health-color', gardenState.health);
            document.getElementById('hp').textContent = Math.round(gardenState.health * 100);

            const nextWater = new Date(gardenState.lastWater + (10 * 60 * 60 * 1000));
            document.getElementById('advice').textContent = `Tavsiye: Bir sonraki sulama ${nextWater.getHours()}:00 civarı.`;
        }

        function giveWater() {
            waterSound.currentTime = 0;
            waterSound.play().catch(e => console.log("Ses çalma engellendi:", e));

            gardenState.health = Math.min(1.5, gardenState.health + 0.15);
            gardenState.lastWater = Date.now();
            localStorage.setItem('garden_premium_v3', JSON.stringify(gardenState));
            
            const btn = document.querySelector('.water-btn');
            btn.style.transform = "scale(0.9)";
            setTimeout(() => btn.style.transform = "scale(1)", 100);
            
            update();
        }

        init();
    </script>
</body>
