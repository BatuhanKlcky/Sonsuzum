<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaşayan Bahçe - Final</title>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        :root {
            --growth: 1;
            --health-color: 1;
            --sky-1: #000811;
            --sky-2: #001a33;
        }

        body {
            background: linear-gradient(to top, var(--sky-2), var(--sky-1));
            height: 100vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            transition: background 2s ease;
        }

        /* --- UI PANEL --- */
        .ui-panel {
            position: fixed;
            top: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 20px;
            color: white;
            z-index: 100;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            width: 280px;
        }

        .water-btn {
            background: #00d4ff;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
            margin-top: 10px;
        }

        .water-btn:active { transform: scale(0.9); background: #008cb3; }

        /* --- ÇİÇEKLER --- */
        .flower_wrapper {
            position: absolute;
            bottom: 40px;
            transform-origin: bottom center;
            /* Sulayınca büyüme hissi veren asıl kısım burası */
            transform: scale(var(--growth));
            filter: saturate(var(--health-color)) brightness(var(--health-color));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .f1 { left: 15%; } .f2 { left: 50%; } .f3 { left: 85%; }

        .flower_stem {
            width: 10px; height: 50vmin;
            background: linear-gradient(to top, #133a1f, #2ecc71);
            border-radius: 5px;
        }

        .flower_center {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 10vmin; height: 10vmin; border-radius: 50%;
            background: radial-gradient(circle, #4b2c00, #ff8c00); z-index: 5;
        }

        .flower_petal {
            position: absolute; left: 50%; bottom: 45vmin;
            width: 5vmin; height: 15vmin; transform-origin: center bottom;
            border-radius: 50% 50% 20% 20%;
        }

        .rose .flower_petal { background: radial-gradient(circle, #ff0033, #8b0000); }
        .sunflower .flower_petal { background: radial-gradient(circle, #ffcc00, #ff8c00); }
        .blue .flower_petal { background: radial-gradient(circle, #00d4ff, #0056b3); }

        /* Yaprak Açıları */
        .p1 { transform: translateX(-50%) rotate(0deg); }
        .p2 { transform: translateX(-50%) rotate(45deg); }
        .p3 { transform: translateX(-50%) rotate(90deg); }
        .p4 { transform: translateX(-50%) rotate(135deg); }
        .p5 { transform: translateX(-50%) rotate(180deg); }
        .p6 { transform: translateX(-50%) rotate(225deg); }
        .p7 { transform: translateX(-50%) rotate(270deg); }
        .p8 { transform: translateX(-50%) rotate(315deg); }

        /* Yağmur/Su Efekti */
        .drop {
            position: absolute; width: 2px; height: 15px; background: #00d4ff;
            top: -20px; animation: fall 0.5s linear forwards;
        }
        @keyframes fall { to { transform: translateY(100vh); opacity: 0; } }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 id="time">00:00</h2>
        <div style="margin: 5px 0;">Sağlık: %<span id="hp">100</span></div>
        <button class="water-btn" onclick="giveWater()">💧 CAN SUYU VER</button>
        <p id="msg" style="font-size: 11px; margin-top: 5px; color: #aaa;">Gece uykusu vakti...</p>
    </div>

    <div id="garden">
        <div class="flower_wrapper rose f1"><div class="flower_stem"></div><div class="flower_center"></div><div class="flower_petal p1"></div><div class="flower_petal p2"></div><div class="flower_petal p3"></div><div class="flower_petal p4"></div><div class="flower_petal p5"></div><div class="flower_petal p6"></div><div class="flower_petal p7"></div><div class="flower_petal p8"></div></div>
        <div class="flower_wrapper sunflower f2"><div class="flower_stem"></div><div class="flower_center"></div><div class="flower_petal p1"></div><div class="flower_petal p2"></div><div class="flower_petal p3"></div><div class="flower_petal p4"></div><div class="flower_petal p5"></div><div class="flower_petal p6"></div><div class="flower_petal p7"></div><div class="flower_petal p8"></div></div>
        <div class="flower_wrapper blue f3"><div class="flower_stem"></div><div class="flower_center"></div><div class="flower_petal p1"></div><div class="flower_petal p2"></div><div class="flower_petal p3"></div><div class="flower_petal p4"></div><div class="flower_petal p5"></div><div class="flower_petal p6"></div><div class="flower_petal p7"></div><div class="flower_petal p8"></div></div>
    </div>

    <script>
        let health = 1.0;
        let lastWater = Date.now();

        // Sayfa yüklendiğinde hafızadan al
        if(localStorage.getItem('garden_save')) {
            const data = JSON.parse(localStorage.getItem('garden_save'));
            health = data.h;
            lastWater = data.lw;
        }

        function update() {
            const now = new Date();
            const h = now.getHours();
            
            // Saati güncelle
            document.getElementById('time').textContent = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');

            // Zamanla solma (Saatte %2 azalır)
            const hoursPassed = (Date.now() - lastWater) / (1000 * 60 * 60);
            const currentHealth = Math.max(0.3, health - (hoursPassed * 0.02));

            // Görselleri Uygula
            document.documentElement.style.setProperty('--growth', currentHealth);
            document.documentElement.style.setProperty('--health-color', currentHealth);
            document.getElementById('hp').textContent = Math.round(currentHealth * 100);

            // Gece - Gündüz Renkleri
            const root = document.documentElement;
            if(h >= 6 && h < 19) {
                root.style.setProperty('--sky-1', '#00d4ff');
                root.style.setProperty('--sky-2', '#ffffff');
                document.getElementById('msg').textContent = "Güneş parlıyor! ☀️";
            } else {
                root.style.setProperty('--sky-1', '#000811');
                root.style.setProperty('--sky-2', '#001a33');
                document.getElementById('msg').textContent = "Çiçekler gece uykusunda... ✨";
            }
        }

        function giveWater() {
            // Sağlığı artır (Maksimum %150)
            health = Math.min(1.5, health + 0.1);
            lastWater = Date.now();
            
            // Hafızaya kaydet
            localStorage.setItem('garden_save', JSON.stringify({h: health, lw: lastWater}));

            // Su damlası efekti
            for(let i=0; i<10; i++) {
                let drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + "vw";
                drop.style.animationDelay = Math.random() * 0.2 + "s";
                document.body.appendChild(drop);
                setTimeout(() => drop.remove(), 600);
            }

            update();
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
