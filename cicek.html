<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaşayan Bahçe v3</title>
    <style>
        * { 
            padding: 0; margin: 0; box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* Dinamik Gökyüzü Renkleri (JS ile değişecek) */
            --sky-top: #001a33;
            --sky-bottom: #000;
            --sun-moon-shadow: rgba(255,255,255,0);
            
            --line-color: linear-gradient(to left top, #82ff86 20%, #144425, #104e1c);
            --growth: 1;
            --health-color: 1;
            --night-dim: 1; /* Gece çiçekleri karartmak için */
        }

        body {
            background: linear-gradient(to top, var(--sky-bottom), var(--sky-top));
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            transition: background 2s ease;
        }

        /* --- GÖKYÜZÜ ELEMANLARI --- */
        #celestial {
            position: absolute;
            top: 10%;
            left: 50%;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            transform: translateX(-50%);
            transition: all 2s ease;
            box-shadow: 0 0 50px var(--sun-moon-shadow);
            z-index: 1;
        }

        /* --- UI PANELİ --- */
        .ui-panel {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            z-index: 100;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .clock { font-size: 24px; font-weight: bold; margin-bottom: 5px; color: #00d4ff; }
        .next-water { font-size: 13px; color: #ffcc00; margin-bottom: 10px; }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 12px; font-size: 14px; }

        .water-btn {
            background: #00d4ff;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .water-btn:active { transform: scale(0.95); }

        /* --- ÇİÇEKLER --- */
        .flower_wrapper {
            position: absolute;
            bottom: 5vmin;
            transform-origin: bottom center;
            transform: scale(var(--growth));
            /* Gece olunca ve sağlık düşünce kararır */
            filter: saturate(var(--health-color)) brightness(calc(var(--health-color) * var(--night-dim)));
            transition: all 1s ease;
        }

        .flower_stem {
            width: 1.5vmin; height: 45vmin;
            background-image: var(--line-color);
            border-radius: 4vmin;
        }

        .flower_center {
            position: absolute;
            top: 0; left: 50%; z-index: 5;
            transform: translateX(-50%);
            width: 10vmin; height: 10vmin;
            border-radius: 50%;
            background: radial-gradient(circle, #000, #ff5e00);
        }

        .flower_petal {
            position: absolute;
            left: 50%; z-index: 3; bottom: 38vmin;
            transform: translateX(-50%);
            width: 4.5vmin; height: 14vmin;
            border-radius: 50% 50% 10% 10% / 80% 80% 20% 20%;
            transform-origin: center bottom;
        }

        .sunflower { --petal-bg: radial-gradient(circle, #ff5e00, #ffbb00); }
        .rose { --petal-bg: radial-gradient(circle, #ff0033, #80001a); }
        .blue-flower { --petal-bg: radial-gradient(circle, #00d4ff, #003366); }
        .flower_petal { background: var(--petal-bg); }

        /* Yaprak Dizilimi */
        .p-2 { transform: translateX(-50%) rotate(45deg); }
        .p-3 { transform: translateX(-50%) rotate(90deg); }
        .p-4 { transform: translateX(-50%) rotate(135deg); }
        .p-5 { transform: translateX(-50%) rotate(180deg); }
        .p-6 { transform: translateX(-50%) rotate(225deg); }
        .p-7 { transform: translateX(-50%) rotate(270deg); }
        .p-8 { transform: translateX(-50%) rotate(315deg); }

        .f1 { left: 15%; transform: scale(calc(var(--growth) * 0.7)); }
        .f2 { left: 50%; z-index: 10; }
        .f3 { left: 85%; transform: scale(calc(var(--growth) * 0.7)); }

        .light {
            position: absolute;
            width: 3px; height: 3px;
            background-color: #fffb00;
            border-radius: 50%;
            filter: blur(1px);
            animation: move 8s infinite linear;
            opacity: 0;
        }

        @keyframes move {
            0% { transform: translate(0, 0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translate(15vw, -80vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="celestial"></div>

    <div class="ui-panel">
        <div class="clock" id="clock">00:00</div>
        <div class="next-water" id="next-water">Sulama zamanı hesaplanıyor...</div>
        <div class="stats">
            <span>Can: %<b id="health-val">100</b></span>
            <span>Gökyüzü: <b id="sky-desc">Gece</b></span>
        </div>
        <button class="water-btn" onclick="waterFlowers()">💧 ŞİMDİ SULA</button>
    </div>

    <div id="garden">
        <div class="flower_wrapper rose f1"><div class="flower_stem"></div><div class="flower_center"></div><div class="flower_petal"></div><div class="flower_petal p-2"></div><div class="flower_petal p-3"></div><div class="flower_petal p-4"></div><div class="flower_petal p-5"></div><div class="flower_petal p-6"></div><div class="flower_petal p-7"></div><div class="flower_petal p-8"></div></div>
        <div class="flower_wrapper sunflower f2"><div class="flower_stem"></div><div class="flower_center"></div><div class="flower_petal"></div><div class="flower_petal p-2"></div><div class="flower_petal p-3"></div><div class="flower_petal p-4"></div><div class="flower_petal p-5"></div><div class="flower_petal p-6"></div><div class="flower_petal p-7"></div><div class="flower_petal p-8"></div></div>
        <div class="flower_wrapper blue-flower f3"><div class="flower_stem"></div><div class="flower_center"></div><div class="flower_petal"></div><div class="flower_petal p-2"></div><div class="flower_petal p-3"></div><div class="flower_petal p-4"></div><div class="flower_petal p-5"></div><div class="flower_petal p-6"></div><div class="flower_petal p-7"></div><div class="flower_petal p-8"></div></div>
    </div>

    <script>
        let state = {
            health: 1.0,
            lastWatered: Date.now()
        };

        // --- ZAMAN VE GÖKYÜZÜ MANTIĞI ---
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const mins = now.getMinutes();
            
            // Saati güncelle
            document.getElementById('clock').textContent = 
                `${hours.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}`;

            updateSky(hours);
            calculateWithering();
            updateVisuals();
            updateWaterAdvice();
        }

        function updateSky(hour) {
            const celestial = document.getElementById('celestial');
            const skyDesc = document.getElementById('sky-desc');
            const root = document.documentElement;
            let colors = {};

            if (hour >= 5 && hour < 8) { // Gün Doğumu
                colors = { t: "#ff9d6c", b: "#504b8e", desc: "Gün Doğumu", c: "#ffcc00", s: "rgba(255,200,0,0.5)", dim: 0.9 };
            } else if (hour >= 8 && hour < 17) { // Gündüz
                colors = { t: "#00d4ff", b: "#ffffff", desc: "Gündüz", c: "#ffee00", s: "rgba(255,255,0,0.8)", dim: 1 };
            } else if (hour >= 17 && hour < 20) { // Gün Batımı
                colors = { t: "#2c3e50", b: "#e67e22", desc: "Gün Batımı", c: "#ff5e00", s: "rgba(255,100,0,0.6)", dim: 0.8 };
            } else { // Gece
                colors = { t: "#000b1a", b: "#000000", desc: "Gece", c: "#f5f5f5", s: "rgba(255,255,255,0.4)", dim: 0.5 };
            }

            root.style.setProperty('--sky-top', colors.t);
            root.style.setProperty('--sky-bottom', colors.b);
            root.style.setProperty('--sun-moon-shadow', colors.s);
            root.style.setProperty('--night-dim', colors.dim);
            celestial.style.backgroundColor = colors.c;
            skyDesc.textContent = colors.desc;

            // Ateş böceklerini sadece gece göster
            document.querySelectorAll('.light').forEach(l => {
                l.style.display = (hour >= 20 || hour < 5) ? 'block' : 'none';
            });
        }

        // --- SULAMA TAVSİYESİ ---
        function updateWaterAdvice() {
            // Sağlığın %70'e düşeceği zamanı hesapla
            // Mevcut hız: saatte %2 kayıp
            const currentHP = state.health;
            const hoursLeft = (currentHP - 0.7) / 0.02;
            
            const adviceEl = document.getElementById('next-water');
            
            if (currentHP <= 0.7) {
                adviceEl.textContent = "⚠️ Çiçekler susadı! Hemen sulamalısın.";
                adviceEl.style.color = "#ff4444";
            } else {
                const nextTime = new Date(Date.now() + hoursLeft * 3600000);
                const h = nextTime.getHours().toString().padStart(2,'0');
                const m = nextTime.getMinutes().toString().padStart(2,'0');
                adviceEl.textContent = `💡 Sonraki sulama tavsiyesi: Bugün ${h}:${m}`;
                adviceEl.style.color = "#ffcc00";
            }
        }

        // --- TEMEL FONKSİYONLAR ---
        function calculateWithering() {
            const now = Date.now();
            const hoursPassed = (now - state.lastWatered) / (1000 * 60 * 60);
            state.health = Math.max(0.1, 1.0 - (hoursPassed * 0.02)); // Saatte %2 azalır
        }

        function waterFlowers() {
            state.health = Math.min(1.4, state.health + 0.2);
            state.lastWatered = Date.now();
            if (navigator.vibrate) navigator.vibrate(50);
            saveGame();
            updateVisuals();
            updateWaterAdvice();
        }

        function saveGame() { localStorage.setItem('garden_v3', JSON.stringify(state)); }
        function loadGame() {
            const saved = localStorage.getItem('garden_v3');
            if (saved) state = JSON.parse(saved);
        }

        function updateVisuals() {
            document.documentElement.style.setProperty('--growth', state.health);
            document.documentElement.style.setProperty('--health-color', state.health);
            document.getElementById('health-val').textContent = Math.round(state.health * 100);
        }

        // Ateş böceği oluştur
        for(let i=0; i<12; i++) {
            let l = document.createElement('div');
            l.className = 'light';
            l.style.left = Math.random() * 100 + 'vw';
            l.style.bottom = Math.random() * 30 + 'vh';
            l.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(l);
        }

        loadGame();
        updateTime();
        setInterval(updateTime, 1000); // Her saniye saati ve durumu kontrol et
    </script>
</body>
</html>
