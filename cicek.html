<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanal Çiçek Bahçem</title>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        :root {
            --color-bg: linear-gradient(to top, #001a33, #000);
            --line-color: linear-gradient(to left top, #82ff86 20%, #144425, #104e1c);
            --leaf-color: radial-gradient(circle, #82ff86, #104e1c);
            
            /* Dinamik Değişkenler (JS ile değişecek) */
            --growth: 1; /* Çiçek boyutu */
            --health-color: 1; /* Renk doygunluğu */
        }

        body {
            background-image: var(--color-bg);
            min-height: 100vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- UI PANELİ --- */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: white;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .water-btn {
            background: #00d4ff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .water-btn:hover { background: #008cb3; transform: scale(1.05); }
        .water-btn:active { transform: scale(0.95); }

        /* --- ÇİÇEK GENEL YAPISI --- */
        .flower_wrapper {
            position: absolute;
            bottom: 2vmin;
            transform-origin: bottom center;
            /* JS'den gelen büyüme ve sağlık değerlerini uyguluyoruz */
            transform: scale(var(--growth));
            filter: saturate(var(--health-color)) brightness(var(--health-color));
            transition: all 1s ease-in-out;
        }

        .flower_stem {
            width: 1.5vmin;
            height: 60vmin;
            background-image: var(--line-color);
            border-radius: 4vmin;
        }

        .flower_center {
            position: absolute;
            top: 0vmin; left: 50%; z-index: 5;
            transform: translateX(-50%);
            width: 15vmin; height: 15vmin;
            border-radius: 50%;
            background: radial-gradient(circle, #000, #ff5e00);
        }

        .flower_petal {
            position: absolute;
            left: 50%; z-index: 3; bottom: 50vmin;
            transform: translateX(-50%);
            width: 6vmin; height: 18vmin;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            transform-origin: center bottom;
        }

        /* Renk Varyasyonları */
        .sunflower { --petal-bg: radial-gradient(circle, #ff5e00, #ffbb00); }
        .rose { --petal-bg: radial-gradient(circle, #ff0033, #80001a); }
        .blue-flower { --petal-bg: radial-gradient(circle, #00d4ff, #003366); }

        .flower_petal { background: var(--petal-bg); }

        /* Yaprak Dizilimi */
        .p-2 { transform: translateX(-50%) rotate(30deg); }
        .p-3 { transform: translateX(-50%) rotate(60deg); }
        .p-4 { transform: translateX(-50%) rotate(90deg); }
        .p-5 { transform: translateX(-50%) rotate(120deg); }
        .p-6 { transform: translateX(-50%) rotate(150deg); }
        .p-7 { transform: translateX(-50%) rotate(180deg); }
        .p-8 { transform: translateX(-50%) rotate(210deg); }
        .p-9 { transform: translateX(-50%) rotate(240deg); }
        .p-10 { transform: translateX(-50%) rotate(270deg); }
        .p-11 { transform: translateX(-50%) rotate(300deg); }
        .p-12 { transform: translateX(-50%) rotate(330deg); }

        /* Konumlar */
        .f1 { left: 25%; }
        .f2 { left: 50%; }
        .f3 { left: 75%; }

        /* Ateş Böcekleri */
        .light {
            position: absolute;
            width: 1vmin; height: 1vmin;
            background-color: #fffb00;
            border-radius: 50%;
            filter: blur(0.2vmin);
            animation: light-move 6s infinite;
        }

        @keyframes light-move {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { transform: translateY(-40vh) translateX(10vw); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h3>Bahçıvan Paneli</h3>
        <p id="status-text">Çiçekler mutlu!</p>
        <p>Sağlık: <span id="health-val">100</span>%</p>
        <button class="water-btn" onclick="waterFlowers()">💧 Çiçekleri Sula</button>
        <p style="font-size: 12px; margin-top: 10px; opacity: 0.7;">Her gün sulamazsan solarlar...</p>
    </div>

    <div id="garden">
        <div class="flower_wrapper rose f1">
            <div class="flower_stem"></div><div class="flower_center"></div>
            <div class="flower_petal"></div><div class="flower_petal p-2"></div><div class="flower_petal p-3"></div>
            <div class="flower_petal p-4"></div><div class="flower_petal p-5"></div><div class="flower_petal p-6"></div>
            <div class="flower_petal p-7"></div><div class="flower_petal p-8"></div><div class="flower_petal p-9"></div>
            <div class="flower_petal p-10"></div><div class="flower_petal p-11"></div><div class="flower_petal p-12"></div>
        </div>

        <div class="flower_wrapper sunflower f2">
            <div class="flower_stem"></div><div class="flower_center"></div>
            <div class="flower_petal"></div><div class="flower_petal p-2"></div><div class="flower_petal p-4"></div>
            <div class="flower_petal p-6"></div><div class="flower_petal p-8"></div><div class="flower_petal p-10"></div>
            <div class="flower_petal p-12"></div>
        </div>

        <div class="flower_wrapper blue-flower f3">
            <div class="flower_stem"></div><div class="flower_center"></div>
            <div class="flower_petal"></div><div class="flower_petal p-2"></div><div class="flower_petal p-3"></div>
            <div class="flower_petal p-4"></div><div class="flower_petal p-5"></div><div class="flower_petal p-6"></div>
            <div class="flower_petal p-7"></div><div class="flower_petal p-8"></div><div class="flower_petal p-9"></div>
            <div class="flower_petal p-10"></div><div class="flower_petal p-11"></div><div class="flower_petal p-12"></div>
        </div>
    </div>

    <div class="light" style="left: 10%; animation-delay: 1s;"></div>
    <div class="light" style="left: 40%; animation-delay: 3s;"></div>
    <div class="light" style="left: 80%; animation-delay: 5s;"></div>

    <script>
        // --- OYUN MANTIĞI ---
        let state = {
            health: 1.0, // 0.2 ile 1.5 arası
            lastWatered: Date.now()
        };

        // Hafızadan verileri yükle
        function loadGame() {
            const saved = localStorage.getItem('flowerGarden');
            if (saved) {
                state = JSON.parse(saved);
                calculateWithering();
            }
            updateVisuals();
        }

        // Geçen zamanı hesapla ve çiçekleri soldur
        function calculateWithering() {
            const now = Date.now();
            const hoursPassed = (now - state.lastWatered) / (1000 * 60 * 60);
            
            // Her 1 saatte %1 sağlık kaybederler (24 saatte %24 eder)
            // Eğer 3 gün sulamazsan tamamen solarlar
            if (hoursPassed > 1) {
                state.health -= (hoursPassed * 0.01);
                if (state.health < 0.2) state.health = 0.2;
            }
        }

        // Çiçekleri sula
        function waterFlowers() {
            state.health += 0.2; // Her sulama %20 canlandırır
            if (state.health > 1.5) state.health = 1.5; // Maksimum büyüme sınırı
            state.lastWatered = Date.now();
            
            saveGame();
            updateVisuals();
            
            // Basit bir geri bildirim
            const btn = document.querySelector('.water-btn');
            btn.textContent = "✨ Sulandı!";
            setTimeout(() => btn.textContent = "💧 Çiçekleri Sula", 1000);
        }

        function saveGame() {
            localStorage.setItem('flowerGarden', JSON.stringify(state));
        }

        function updateVisuals() {
            // CSS değişkenlerini güncelle
            document.documentElement.style.setProperty('--growth', state.health);
            document.documentElement.style.setProperty('--health-color', state.health);

            // UI metinlerini güncelle
            const healthPercent = Math.round(state.health * 100);
            document.getElementById('health-val').textContent = healthPercent;

            const status = document.getElementById('status-text');
            if (healthPercent > 120) status.textContent = "Çiçekler devasa oldu! 🌟";
            else if (healthPercent > 80) status.textContent = "Çiçekler çok mutlu. 😊";
            else if (healthPercent > 40) status.textContent = "Çiçekler biraz susamış. 💧";
            else status.textContent = "Çiçekler ölmek üzere! 🥀";
        }

        // Sayfa açıldığında başlat
        loadGame();

        // Her dakika kontrol et (arka planda açık kalırsa diye)
        setInterval(() => {
            calculateWithering();
            updateVisuals();
        }, 60000);

    </script>
</body>
</html>
