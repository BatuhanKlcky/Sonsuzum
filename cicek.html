<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanal Bahçe: </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #050505; touch-action: none; }
        
        .ui-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 420px; z-index: 1000; }
        .ui-panel { 
            background: rgba(15, 5, 5, 0.96); 
            padding: 18px; border-radius: 28px; color: white; text-align: center; 
            border: 1px solid rgba(255, 50, 50, 0.3); backdrop-filter: blur(15px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
        }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        button { border: none; padding: 14px 4px; border-radius: 14px; color: white; font-weight: 800; cursor: pointer; font-size: 11px; transition: all 0.2s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.2); }
        
        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .btn-home { background: #333; color: #fff; }
        .btn-bug { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        
        #stats { font-size: 11px; color: #bbb; margin-top: 8px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 10px; }
        .stat-bad { color: #ff3e3e; font-weight: 900; }
        .stat-dead { color: #795548; font-weight: 900; }
    </style>
</head>
<body>
    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock" style="font-size:24px; color:#ff3e3e; font-weight: 900;">00:00</div>
            <div id="stats">
                NEM: %<span id="hp">0</span> | CANLI: <span id="fCount">0</span> | <span class="stat-dead">ÖLÜ: <span id="deadCount">0</span></span> | <span class="stat-bad">ZARARLI: <span id="badCount">0</span></span>
            </div>
            
            <div class="controls">
                <button class="btn-home" onclick="resetCamera()">🏠 ODAK</button>
                <button class="btn-water" onclick="waterAll()">💧 SULA</button>
                <button class="btn-seed" onclick="plant()">🌱 EK</button>
                <button class="btn-bug" onclick="addBug()">🦋 DOST</button>
            </div>
        </div>
    </div>

    <script>
        const SAVE_KEY = "garden_survival_v11";
        
        // --- AYARLAR (İHTİMAL ARTIRILDI) ---
        const DRY_RATE = 0.000015; 
        const GROWTH_RATE = 0.000012;
        const BAD_BUG_SPAWN_RATE = 0.0025; // 5 Kat daha fazla böcek!
        const BAD_BUG_DRAIN_RATE = 0.00025; // Sömürme hızı da artırıldı
        const DEATH_THRESHOLD = 0.1; // %10 nemin altı ölümdür.

        const flowers = [];
        const bugs = [];
        const badBugs = [];
        const badBugMeshes = [];
        let badBugIdCounter = 0;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(22, 16, 22);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.background = new THREE.Color(0x020205);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.DirectionalLight(0xffffff, 0.7);
        sun.position.set(10, 30, 10);
        scene.add(sun);

        const ground = new THREE.Mesh(
            new THREE.CircleGeometry(20, 64), 
            new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 1 })
        );
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // --- TIKLA VE EZ ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(badBugMeshes);
            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const bugId = hitMesh.userData.id;
                const bugIndex = badBugs.findIndex(b => b.id === bugId);
                if (bugIndex > -1) {
                    scene.remove(badBugs[bugIndex].group);
                    badBugs.splice(bugIndex, 1);
                    badBugMeshes.splice(badBugMeshes.indexOf(hitMesh), 1);
                }
                save();
            }
        });

        function createBadBug(targetIndex) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            body.scale.set(1.2, 0.6, 1.2);
            group.add(body);
            
            const hitBox = new THREE.Mesh(new THREE.SphereGeometry(1.0, 8, 8), new THREE.MeshBasicMaterial({ visible: false }));
            hitBox.userData.id = badBugIdCounter;
            group.add(hitBox);
            
            group.position.set((Math.random()-0.5)*30, 10, (Math.random()-0.5)*30);
            scene.add(group);
            badBugs.push({ id: badBugIdCounter++, group: group, targetIndex: targetIndex });
            badBugMeshes.push(hitBox);
        }

        function createFlower(x, z, stats = null) {
            const group = new THREE.Group();
            const color = stats ? stats.c : [0xff595e, 0x1982c4, 0xffca3a, 0x8ac926][Math.floor(Math.random()*4)];
            const type = (stats && stats.t !== undefined) ? stats.t : Math.floor(Math.random() * 3);
            
            const grass = new THREE.Mesh(new THREE.CircleGeometry(0.8, 12), new THREE.MeshBasicMaterial({ color: 0x1b4332, transparent: true, opacity: 0.3 }));
            grass.rotation.x = -Math.PI/2; group.add(grass);

            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.07, 1, 8), new THREE.MeshStandardMaterial({color: 0x2d6a4f}));
            stem.position.y = 0.5; group.add(stem);

            const headGroup = new THREE.Group();
            const center = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), new THREE.MeshStandardMaterial({color: 0xffd166}));
            center.position.y = 1; headGroup.add(center);

            const petalMat = new THREE.MeshStandardMaterial({ color: color, side: THREE.DoubleSide });
            for(let i=0; i<8; i++) {
                const p = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.5), petalMat);
                p.position.y = 1.05; p.rotation.y = (i * Math.PI) / 4; p.rotation.x = Math.PI/3;
                headGroup.add(p);
            }
            group.add(headGroup);
            group.position.set(x, 0, z);
            scene.add(group);

            const fObj = { 
                mesh: group, head: headGroup, grass: grass, stem: stem,
                h: stats ? stats.h : 0.2, b: stats ? stats.b : 0, w: stats ? stats.w : 1.0, 
                c: color, t: type, isDead: stats ? stats.isDead : false 
            };
            flowers.push(fObj);
            save();
        }

        window.plant = () => createFlower((Math.random()-0.5)*35, (Math.random()-0.5)*35);
        
        // Sadece canlı olanları sula!
        window.waterAll = () => { 
            flowers.forEach(f => { if(!f.isDead) f.w = 1.3; }); 
            save(); 
        };

        function save() {
            const data = { 
                lastUpdate: Date.now(), 
                plants: flowers.map(f => ({ x: f.mesh.position.x, z: f.mesh.position.z, h: f.h, b: f.b, w: f.w, c: f.c, t: f.t, isDead: f.isDead })),
                badBugs: badBugs.map(b => ({ targetIndex: b.targetIndex }))
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        }

        function load() {
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return;
            const data = JSON.parse(raw);
            const elapsed = (Date.now() - data.lastUpdate) / 1000;
            
            let currentBadBugs = data.badBugs || [];
            const offlineSpawns = Math.floor(elapsed * BAD_BUG_SPAWN_RATE);
            for(let i=0; i < offlineSpawns; i++) {
                if (data.plants.length > 0) currentBadBugs.push({ targetIndex: Math.floor(Math.random() * data.plants.length), isNew: true });
            }

            data.plants.forEach((p, idx) => {
                const bugsOnMe = currentBadBugs.filter(b => b.targetIndex === idx);
                let drain = (elapsed * DRY_RATE);
                bugsOnMe.forEach(b => drain += (b.isNew ? elapsed/2 : elapsed) * BAD_BUG_DRAIN_RATE);
                
                let finalW = Math.max(0, p.w - drain);
                let finalIsDead = p.isDead || (finalW < DEATH_THRESHOLD);
                let finalH = p.h;
                if (!finalIsDead && finalW > 0.4) finalH += Math.min(1.3 - p.h, elapsed * GROWTH_RATE);
                
                createFlower(p.x, p.z, { ...p, w: finalW, h: finalH, isDead: finalIsDead });
            });

            currentBadBugs.forEach(bug => { if (bug.targetIndex < flowers.length) createBadBug(bug.targetIndex); });
        }

        function animate() {
            requestAnimationFrame(animate);
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            if (flowers.filter(f=>!f.isDead).length > 0 && Math.random() < BAD_BUG_SPAWN_RATE / 60) {
                const liveOnes = flowers.map((f, i) => f.isDead ? -1 : i).filter(i => i !== -1);
                createBadBug(liveOnes[Math.floor(Math.random() * liveOnes.length)]);
            }
            
            badBugs.forEach(bug => {
                const target = flowers[bug.targetIndex];
                if (target) {
                    bug.group.position.lerp(new THREE.Vector3(target.mesh.position.x, target.h + 0.2, target.mesh.position.z), 0.05);
                    if(!target.isDead) target.w = Math.max(0, target.w - (BAD_BUG_DRAIN_RATE / 60));
                }
            });

            flowers.forEach(f => {
                if (f.isDead) {
                    // ÖLÜ GÖRÜNÜM: Kahverengi, solmuş ve yatık
                    f.head.children.forEach(p => { if(p.material.color) p.material.color.lerp(new THREE.Color(0x3e2723), 0.05); });
                    f.stem.material.color.lerp(new THREE.Color(0x1a0f00), 0.05);
                    f.mesh.rotation.z = THREE.MathUtils.lerp(f.mesh.rotation.z, 1.2, 0.02); // Yana yatma
                } else {
                    f.w = Math.max(0, f.w - (DRY_RATE / 60));
                    if (f.w < DEATH_THRESHOLD) f.isDead = true; // ÖLÜM ANI
                    
                    if (f.w > 0.4 && f.h < 1.3) f.h += (GROWTH_RATE / 60);
                    f.b = Math.min(1, f.b + 0.01);
                    f.head.scale.set(f.b, f.b, f.b);
                    const s = f.h * (0.7 + f.w * 0.3); 
                    f.mesh.scale.set(s, s, s);
                }
            });

            document.getElementById('hp').innerText = Math.round((flowers.reduce((a,b)=>a+b.w,0)/(flowers.length||1)) * 100);
            document.getElementById('fCount').innerText = flowers.filter(f=>!f.isDead).length;
            document.getElementById('deadCount').innerText = flowers.filter(f=>f.isDead).length;
            document.getElementById('badCount').innerText = badBugs.length;

            controls.update();
            renderer.render(scene, camera);
        }

        function resetCamera() { camera.position.set(22, 16, 22); controls.target.set(0,0,0); }
        window.addEventListener('load', load);
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
