<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sanal Bahçe - Kalıcı Solma Modu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #000; }
        .ui-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 350px; z-index: 1000; }
        .ui-panel { 
            background: rgba(15, 20, 25, 0.92); 
            padding: 22px; border-radius: 30px; color: white; text-align: center; 
            border: 1px solid rgba(255, 71, 87, 0.3); backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        button { border: none; padding: 15px; border-radius: 18px; color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        #status-msg { font-size: 10px; color: #ff4757; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock" style="font-size:28px; color:#ff4757; font-weight: 900;">00:00</div>
            <div style="font-size:12px; color:#aaa; margin: 10px 0;">
                ORT. NEM: %<span id="hp">0</span> | BİTKİ: <span id="fCount">0</span>
            </div>
            <div class="controls">
                <button class="btn-water" onclick="waterAll()">💧 SULA</button>
                <button class="btn-seed" onclick="plant()">🌱 EK</button>
            </div>
            <div id="status-msg">DİKKAT: BAZI BİTKİLER SOLDU VE BÜYÜMEYİ DURDURDU!</div>
        </div>
    </div>

    <script>
        const SAVE_KEY = "garden_hardcore_v8";
        const DRY_RATE = 0.00001389; // Saatte %5
        const GROWTH_RATE = 0.000012;
        const flowers = [];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 20);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        const loader = new THREE.CubeTextureLoader();
        scene.background = loader.load([
            'https://threejs.org/examples/textures/cube/MilkyWay/dark-s_px.jpg', 'https://threejs.org/examples/textures/cube/MilkyWay/dark-s_nx.jpg',
            'https://threejs.org/examples/textures/cube/MilkyWay/dark-s_py.jpg', 'https://threejs.org/examples/textures/cube/MilkyWay/dark-s_ny.jpg',
            'https://threejs.org/examples/textures/cube/MilkyWay/dark-s_pz.jpg', 'https://threejs.org/examples/textures/cube/MilkyWay/dark-s_nz.jpg'
        ]);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 30, 10);
        scene.add(sun);

        const ground = new THREE.Mesh(
            new THREE.CircleGeometry(16, 64), 
            new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 })
        );
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        function createFlower(x, z, stats = null) {
            const group = new THREE.Group();
            const color = stats ? stats.c : [0xff4d6d, 0x00d4ff, 0xffd166, 0x06d6a0][Math.floor(Math.random()*4)];
            
            const grassPatch = new THREE.Mesh(
                new THREE.CircleGeometry(0.8, 16),
                new THREE.MeshBasicMaterial({ color: 0x1b4332, transparent: true, opacity: 0.5 })
            );
            grassPatch.rotation.x = -Math.PI/2;
            grassPatch.position.y = 0.01;
            group.add(grassPatch);

            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 1), new THREE.MeshStandardMaterial({color: 0x2d6a4f}));
            stem.position.y = 0.5; 
            group.add(stem);

            const head = new THREE.Group();
            const center = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshStandardMaterial({color: 0xffd166}));
            center.position.y = 1.02; center.scale.y = 0.5;
            head.add(center);
            const pGeo = new THREE.SphereGeometry(0.2, 8, 5);
            pGeo.scale(1, 0.15, 1.5); pGeo.translate(0, 0, 0.4);
            for(let i=0; i<6; i++) {
                const p = new THREE.Mesh(pGeo, new THREE.MeshStandardMaterial({color: color}));
                p.position.y = 1; p.rotation.y = (i * Math.PI)/3; p.rotation.x = Math.PI/2;
                head.add(p);
            }
            head.scale.set(0.1, 0.1, 0.1);
            group.add(head);
            
            group.position.set(x, 0, z);
            scene.add(group);

            const fObj = { 
                mesh: group, head, grass: grassPatch,
                h: stats ? stats.h : 0.2, 
                b: stats ? stats.b : 0, 
                w: stats ? stats.w : 1.0, 
                c: color,
                isStunted: stats ? stats.isStunted : false // Büyüme engeli kilidi
            };
            flowers.push(fObj);
            document.getElementById('fCount').innerText = flowers.length;
            save();
        }

        window.plant = () => createFlower((Math.random()-0.5)*26, (Math.random()-0.5)*26);
        window.waterAll = () => { flowers.forEach(f => f.w = 1.2); save(); };

        function save() {
            const data = { 
                lastUpdate: Date.now(), 
                plants: flowers.map(f => ({ 
                    x: f.mesh.position.x, z: f.mesh.position.z, 
                    h: f.h, b: f.b, w: f.w, c: f.c, 
                    isStunted: f.isStunted 
                })) 
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        }

        function load() {
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return;
            const data = JSON.parse(raw);
            const elapsed = (Date.now() - data.lastUpdate) / 1000;
            data.plants.forEach(p => {
                let currW = Math.max(0, p.w - (elapsed * DRY_RATE));
                let stuntTriggered = p.isStunted || (currW < 0.3); // Sen yokken nem %30'a düşmüşse cüce kalır
                let currH = p.h;
                if (!stuntTriggered && p.w > 0.4) {
                    currH += Math.min(1.3 - p.h, elapsed * GROWTH_RATE);
                }
                createFlower(p.x, p.z, { ...p, w: currW, h: currH, isStunted: stuntTriggered });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            let anyStunted = false;

            flowers.forEach(f => {
                f.w = Math.max(0, f.w - (DRY_RATE / 60));
                
                if (f.w < 0.3) { 
                    f.isStunted = true; // BİR KEZ SOLURSA BÜYÜME SONSUZA DEK DURUR
                    f.head.children.forEach(p => p.material.color.lerp(new THREE.Color(0x3e2723), 0.02));
                    f.mesh.rotation.z = THREE.MathUtils.lerp(f.mesh.rotation.z, 0.6, 0.02);
                    f.grass.material.color.lerp(new THREE.Color(0x2b2b2b), 0.02);
                } else { 
                    f.head.children.forEach(p => p.material.color.lerp(new THREE.Color(f.c), 0.05));
                    f.mesh.rotation.z = THREE.MathUtils.lerp(f.mesh.rotation.z, 0, 0.05);
                    f.grass.material.color.lerp(new THREE.Color(0x1b4332), 0.05);
                    
                    // Sadece solmamış (stunted olmayanlar) ve nemi olanlar büyür
                    if(!f.isStunted && f.w > 0.4 && f.h < 1.3) {
                        f.h += (GROWTH_RATE / 60);
                    }
                }

                if(f.isStunted) anyStunted = true;

                if(f.h > 0.6) f.b = Math.min(1, f.b + 0.01);
                f.head.scale.set(f.b, f.b, f.b);
                const s = f.h * (0.6 + f.w * 0.4); 
                f.mesh.scale.set(s, s, s);
            });

            document.getElementById('status-msg').style.display = anyStunted ? "block" : "none";
            const avgW = flowers.length ? (flowers.reduce((a,b)=>a+b.w,0)/flowers.length) : 0;
            document.getElementById('hp').innerText = Math.round(avgW * 100);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('load', load);
        window.addEventListener('beforeunload', save);
        setInterval(save, 15000);
        animate();
    </script>
</body>
</html>
