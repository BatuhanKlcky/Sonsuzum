<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sanal Bahçe - Zaman Yolculuğu v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; overflow: hidden; background: #020205; }
        .ui-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 340px; z-index: 1000; }
        .ui-panel { background: rgba(10, 15, 25, 0.98); padding: 20px; border-radius: 25px; color: white; text-align: center; border: 1px solid rgba(0, 212, 255, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        button { border: none; padding: 14px; border-radius: 15px; color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        .btn-water { background: linear-gradient(135deg, #00d4ff, #0077ff); }
        .btn-seed { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        #status-bar { position: fixed; top: 10px; width: 100%; text-align: center; color: #ff4757; font-size: 12px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="status-bar"></div>
    <div class="ui-container">
        <div class="ui-panel">
            <div id="clock" style="font-size:24px; color:#00d4ff">00:00</div>
            <div style="font-size:10px; color:#aaa; margin-bottom: 5px;">BAHÇE DURUMU</div>
            <div style="font-size:12px; color:#fff">ORT. NEM: %<span id="hp">0</span> | BİTKİ: <span id="fCount">0</span></div>
            <div class="controls">
                <button class="btn-water" onclick="waterAll()">💧 TÜMÜNÜ SULA</button>
                <button class="btn-seed" onclick="plant()">🌱 TOHUM EK</button>
            </div>
        </div>
    </div>

    <script>
        // --- AYARLAR ---
        const SAVE_KEY = "garden_v2_save";
        const DRY_RATE_PER_SEC = 0.005;   // Saniyede ne kadar kurur?
        const GROWTH_RATE_PER_SEC = 0.002; // Saniyede ne kadar büyür?
        
        const flowers = [];
        const pests = [];

        // --- KAYIT SİSTEMİ (ÇEVRİMDIŞI MANTIK) ---
        function save() {
            const data = {
                lastUpdate: Date.now(), // Kayıt anındaki zaman
                plants: flowers.map(f => ({
                    x: f.mesh.position.x,
                    z: f.mesh.position.z,
                    h: f.h, // Boy
                    b: f.b, // Çiçek açma durumu
                    w: f.w, // Nem
                    c: f.c  // Renk
                }))
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        }

        function load() {
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return;

            const data = JSON.parse(raw);
            const now = Date.now();
            const elapsedSeconds = (now - data.lastUpdate) / 1000; // Geçen süreyi saniyeye çevir

            data.plants.forEach(p => {
                // SİMEDİ SÜRE HESABI: Sen yokken ne oldu?
                let currentW = Math.max(0, p.w - (elapsedSeconds * DRY_RATE_PER_SEC));
                let currentH = p.h;
                
                // Eğer bitki yeterince nemliyse sen yokken büyümeye devam etsin
                if (p.w > 0.8 && currentH < 1.3) {
                    currentH += Math.min(1.3 - currentH, elapsedSeconds * GROWTH_RATE_PER_SEC);
                }

                // Hesaplanmış değerlerle çiçeği oluştur
                createFlower(p.x, p.z, { ...p, w: currentW, h: currentH });
            });
            console.log(`${Math.round(elapsedSeconds)} saniye sonra bahçeye geri döndün.`);
        }

        // --- THREE.JS DÜNYASI ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 20);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        const ground = new THREE.Mesh(
            new THREE.CircleGeometry(16, 64), 
            new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 })
        );
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // --- BİTKİ OLUŞTURMA ---
        function createFlower(x, z, stats = null) {
            const group = new THREE.Group();
            const color = stats ? stats.c : [0xff4d6d, 0xffd166, 0x06d6a0, 0x7209b7][Math.floor(Math.random()*4)];
            
            // Gövde
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.08, 1), new THREE.MeshStandardMaterial({color: 0x2d6a4f}));
            stem.position.y = 0.5; 
            group.add(stem);

            // Taç Yapraklar
            const petals = new THREE.Group();
            const pGeo = new THREE.SphereGeometry(0.2, 8, 4);
            pGeo.scale(1, 0.2, 1.5); 
            pGeo.translate(0, 0, 0.5);
            for(let i=0; i<6; i++) {
                const p = new THREE.Mesh(pGeo, new THREE.MeshStandardMaterial({color: color}));
                p.position.y = 1; 
                p.rotation.y = (i * Math.PI)/3; 
                p.rotation.x = Math.PI/2;
                petals.add(p);
            }
            petals.scale.set(0.1, 0.1, 0.1); 
            group.add(petals);
            
            group.position.set(x, 0, z);
            scene.add(group);

            const fObj = { 
                mesh: group, 
                petals, 
                h: stats ? stats.h : 0.2, // Boy
                b: stats ? stats.b : 0,   // Açma oranı
                w: stats ? stats.w : 1.2, // Nem (1.0 tam nem, 1.5 ekstra sulu)
                c: color 
            };
            flowers.push(fObj);
            document.getElementById('fCount').innerText = flowers.length;
            save();
        }

        // --- ETKİLEŞİMLER ---
        window.plant = () => createFlower((Math.random()-0.5)*25, (Math.random()-0.5)*25);
        
        window.waterAll = () => { 
            flowers.forEach(f => f.w = 1.5); 
            save(); 
        };

        // --- ANA DÖNGÜ ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            
            // Saat güncelleme
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            flowers.forEach(f => {
                // Gerçek zamanlı kuruma (Saniyede DRY_RATE kadar)
                // 60 FPS varsayımıyla her karede azaltıyoruz
                f.w = Math.max(0, f.w - (DRY_RATE_PER_SEC / 60));
                
                // Büyüme mantığı: Eğer nem %80 üzerindeyse boy atar
                if(f.w > 0.8 && f.h < 1.3) {
                    f.h += (GROWTH_RATE_PER_SEC / 60);
                }
                
                // Çiçek açma: Boy 0.8'i geçince çiçekler belirir
                if(f.h > 0.8) f.b = Math.min(1, f.b + 0.01);
                f.petals.scale.set(f.b, f.b, f.b);
                
                // Görsel ölçeklendirme (Susuz kalınca bitki büzüşür)
                const visualScale = f.h * Math.min(1, f.w + 0.2); 
                f.mesh.scale.set(visualScale, visualScale, visualScale);
            });

            // UI Güncelleme
            const avgW = flowers.length ? (flowers.reduce((a,b)=>a+b.w,0)/flowers.length) : 0;
            document.getElementById('hp').innerText = Math.round(avgW * 100);

            controls.update(); 
            renderer.render(scene, camera);
        }

        // --- BAŞLATICI ---
        window.addEventListener('load', load);
        // Sayfa her kapandığında kaydet
        window.addEventListener('beforeunload', save);
        // Her 30 saniyede bir otomatik kaydet (Garanti olsun)
        setInterval(save, 10000);

        animate();

        // Pencere Boyutu Değişimi
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
