<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Çiçek Tarlası</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: linear-gradient(to top, #001a33, #000); /* Gece gökyüzü */
            --line-color: linear-gradient(to left top, #82ff86 20%, #144425, #104e1c);
            --leaf-color: radial-gradient(circle, #82ff86, #104e1c);
            
            /* Varsayılan Ayçiçeği Renkleri */
            --flower-center: radial-gradient(circle, #000, #ff5e00);
            --petal-color: radial-gradient(circle, #ff5e00, #ffbb00);
        }

        body {
            background-image: var(--color-bg);
            min-height: 100vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }

        /* --- ÇİÇEK GENEL YAPISI --- */
        .flower_wrapper {
            position: absolute;
            bottom: 2vmin;
            animation: moving-flower-1 4s linear infinite;
            transform-origin: bottom center;
        }

        .flower_stem {
            width: 1.5vmin;
            height: 60vmin;
            background-image: var(--line-color);
            border-radius: 4vmin;
        }

        .flower_center {
            position: absolute;
            top: 0vmin;
            left: 50%;
            z-index: 5;
            transform: translateX(-50%);
            width: 15vmin;
            height: 15vmin;
            border-radius: 50%;
            background: var(--flower-center);
            animation: open-flower-middle 2s 0.4s backwards;
        }

        .flower_petal {
            position: absolute;
            left: 50%;
            z-index: 3;
            bottom: 50vmin;
            transform: translateX(-50%);
            width: 6vmin;
            height: 18vmin;
            background: var(--petal-color);
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            transform-origin: center bottom;
            animation: open-flower 2s 1s backwards;
        }

        /* --- FARKLI ÇİÇEK TÜRLERİ --- */
        
        /* GÜL TASARIMI */
        .rose {
            --petal-color: radial-gradient(circle, #ff0033, #80001a);
            --flower-center: radial-gradient(circle, #4d000f, #ff0033);
        }
        .rose .flower_petal {
            width: 8vmin; /* Güllerin yaprakları biraz daha geniştir */
            border-radius: 50% 50% 10% 10%;
        }

        /* MAVİ ÇİÇEK TASARIMI */
        .blue-flower {
            --petal-color: radial-gradient(circle, #00d4ff, #003366);
            --flower-center: radial-gradient(circle, #001a33, #00d4ff);
        }

        /* Konumlandırmalar */
        .f1 { left: 20%; transform: scale(0.8); }
        .f2 { left: 50%; transform: scale(1.1); z-index: 10; } /* Merkezdeki büyük ayçiçeği */
        .f3 { left: 80%; transform: scale(0.9); }
        .f4 { left: 35%; transform: scale(0.7); opacity: 0.8; }
        .f5 { left: 65%; transform: scale(0.75); opacity: 0.8; }

        /* Yaprak Pozisyonları (Döngü ile oluşturulan 12 yaprak) */
        .p-2  { transform: translateX(-50%) rotate(-30deg); }
        .p-3  { transform: translateX(-50%) rotate(-60deg); }
        .p-4  { transform: translateX(-50%) rotate(-90deg); }
        .p-5  { transform: translateX(-50%) rotate(-120deg); }
        .p-6  { transform: translateX(-50%) rotate(-150deg); }
        .p-7  { transform: translateX(-50%) rotate(30deg); }
        .p-8  { transform: translateX(-50%) rotate(60deg); }
        .p-9  { transform: translateX(-50%) rotate(90deg); }
        .p-10 { transform: translateX(-50%) rotate(120deg); }
        .p-11 { transform: translateX(-50%) rotate(150deg); }
        .p-12 { transform: translateX(-50%) rotate(180deg); }

        .flower_leaf {
            position: absolute;
            left: 50%;
            bottom: 15vmin;
            width: 5vmin;
            height: 12vmin;
            background: var(--leaf-color);
            border-radius: 10vmin 2vmin 10vmin 2vmin;
            transform-origin: center bottom;
        }
        .leaf-1 { transform: translateX(-100%) rotate(-45deg); }
        .leaf-2 { transform: translateX(0%) rotate(45deg); bottom: 20vmin; }

        /* --- ATEŞ BÖCEKLERİ VE IŞIKLAR --- */
        .light {
            position: absolute;
            width: 1vmin;
            height: 1vmin;
            background-color: #fffb00;
            border-radius: 50%;
            filter: blur(0.2vmin);
            animation: light-ans-background 6s infinite;
        }

        /* --- ANİMASYONLAR --- */
        @keyframes open-flower {
            0% { transform: translateX(-50%) rotate(0) scale(0); opacity: 0; }
        }

        @keyframes open-flower-middle {
            0% { opacity: 0; transform: translateX(-50%) scale(0); }
        }

        @keyframes light-ans-background {
            0%, 100% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-50vh) translateX(5vw); }
        }

        @keyframes moving-flower-1 {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
    </style>
</head>
<body>

    <div class="flower_wrapper rose f1">
        <div class="flower_stem"></div>
        <div class="flower_center"></div>
        <div class="flower_petal"></div>
        <div class="flower_petal p-2"></div>
        <div class="flower_petal p-3"></div>
        <div class="flower_petal p-4"></div>
        <div class="flower_petal p-5"></div>
        <div class="flower_petal p-6"></div>
        <div class="flower_petal p-7"></div>
        <div class="flower_petal p-8"></div>
        <div class="flower_petal p-9"></div>
        <div class="flower_petal p-10"></div>
        <div class="flower_petal p-11"></div>
        <div class="flower_petal p-12"></div>
        <div class="flower_leaf leaf-1"></div>
    </div>

    <div class="flower_wrapper blue-flower f4">
        <div class="flower_stem" style="height: 40vmin;"></div>
        <div class="flower_center" style="width: 10vmin; height: 10vmin;"></div>
        <div class="flower_petal" style="bottom: 32vmin;"></div>
        <div class="flower_petal p-2" style="bottom: 32vmin;"></div>
        <div class="flower_petal p-4" style="bottom: 32vmin;"></div>
        <div class="flower_petal p-6" style="bottom: 32vmin;"></div>
        <div class="flower_petal p-8" style="bottom: 32vmin;"></div>
        <div class="flower_petal p-10" style="bottom: 32vmin;"></div>
        <div class="flower_petal p-12" style="bottom: 32vmin;"></div>
    </div>

    <div class="flower_wrapper f2">
        <div class="flower_stem"></div>
        <div class="flower_center"></div>
        <div class="flower_petal"></div>
        <div class="flower_petal p-2"></div>
        <div class="flower_petal p-3"></div>
        <div class="flower_petal p-4"></div>
        <div class="flower_petal p-5"></div>
        <div class="flower_petal p-6"></div>
        <div class="flower_petal p-7"></div>
        <div class="flower_petal p-8"></div>
        <div class="flower_petal p-9"></div>
        <div class="flower_petal p-10"></div>
        <div class="flower_petal p-11"></div>
        <div class="flower_petal p-12"></div>
        <div class="flower_leaf leaf-1"></div>
        <div class="flower_leaf leaf-2"></div>
    </div>

    <div class="flower_wrapper rose f3">
        <div class="flower_stem"></div>
        <div class="flower_center"></div>
        <div class="flower_petal"></div>
        <div class="flower_petal p-2"></div>
        <div class="flower_petal p-4"></div>
        <div class="flower_petal p-6"></div>
        <div class="flower_petal p-8"></div>
        <div class="flower_petal p-10"></div>
        <div class="flower_petal p-12"></div>
        <div class="flower_leaf leaf-2"></div>
    </div>

    <div class="light" style="left: 10%; animation-delay: 1s;"></div>
    <div class="light" style="left: 30%; animation-delay: 3s;"></div>
    <div class="light" style="left: 50%; animation-delay: 0s;"></div>
    <div class="light" style="left: 70%; animation-delay: 5s;"></div>
    <div class="light" style="left: 90%; animation-delay: 2s;"></div>

</body>
</html>
